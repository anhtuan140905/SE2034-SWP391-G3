<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|Chọn ghế — ${event.title} - EventHub|">Chọn ghế - EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/homepage/css/choose_seat.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/footer.css}"/>
</head>
<body>

<div class="background-glows">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>
</div>

<div th:replace="~{homepage/fragments/header :: header('')}"></div>

<div class="container main-container mt-4"
     id="seat-map-root"
     th:data-event-id="${event.eventId}">

    <div class="event-info-strip">
        <div>
            <h2 class="strip-event-title" th:text="${event.title}">Tên sự kiện</h2>
            <div class="strip-event-meta">
                <span>
                    <i class="fa-solid fa-calendar-days"></i>
                    <span th:text="${#temporals.format(event.date, 'EEEE, dd MMMM, yyyy', new java.util.Locale('vi'))}">
                        Ngày tổ chức
                    </span>
                </span>
                <span>
                    <i class="fa-solid fa-clock"></i>
                    <span th:text="${#temporals.format(event.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(event.endTime, 'HH:mm')}">
                        Giờ
                    </span>
                </span>
                <span>
                    <i class="fa-solid fa-map-pin"></i>
                    <span th:text="${event.venueName} + ', ' + ${event.address.ward.city.name}">
                        Địa điểm
                    </span>
                </span>
            </div>
        </div>
    </div>

    <div class="checkout-layout" id="type-container">
        <div class="seats-section">
            <div class="seats-header">
                <h3 class="seats-heading">Sơ đồ chỗ ngồi</h3>
                <div class="legend-container">
                    <div class="legend-item"><span class="legend-square available"></span><span>Trống</span></div>
                    <div class="legend-item"><span class="legend-square selected"></span><span>Đã chọn</span></div>
                    <div class="legend-item"><span class="legend-square locked"></span><span>Bị khóa</span></div>
                    <div class="legend-item"><span class="legend-square sold"></span><span>Đã bán</span></div>
                </div>
            </div>

            <div class="screen-banner">MÀN HÌNH / SÂN KHẤU</div>
            <div class="zones-container">
                <div class="seat-zone zone-1">
                    <div class="zone-title"><i class="fa-solid fa-crown"></i> Khu A</div>
                    <div class="zone-grid-wrapper"><div class="seats-grid" id="zoneA-grid"></div></div>
                </div>
                <div class="seat-zone zone-2">
                    <div class="zone-title"><i class="fa-solid fa-star"></i> Khu B</div>
                    <div class="zone-grid-wrapper"><div class="seats-grid" id="zoneB-grid"></div></div>
                </div>
                <div class="seat-zone zone-3">
                    <div class="zone-title"><i class="fa-solid fa-circle-user"></i> Khu C</div>
                    <div class="zone-grid-wrapper"><div class="seats-grid" id="zoneC-grid"></div></div>
                </div>
            </div>
        </div>

        <div class="summary-sidebar">
            <div class="summary-card" style="margin-bottom: 15px;">
                <h3 class="summary-title"><i class="fa-solid fa-file-invoice-dollar me-2 text-pink"></i> Tóm tắt đơn hàng</h3>
                <div class="summary-divider"></div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="selected-seats-list" id="selected-seats-badges">
                            <div class="text-muted py-1" style="font-size:12px;font-style:italic;" id="empty-seats-hint">Chưa chọn ghế nào trên sơ đồ.</div>
                        </div>
                        <span class="text-pink" style="font-size:12px;font-weight:700;font-family:monospace;" id="selected-summary-count">0/6</span>
                    </div>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-info-row"><span>Số lượng vé</span><span class="summary-info-value" id="tickets-count">0</span></div>
                <div class="summary-info-row"><span>Tạm tính</span><span class="summary-info-value" id="subtotal-calc">0 ₫</span></div>
                <div class="summary-divider"></div>
                <div class="total-row"><span class="total-label">Tổng cộng</span><span class="total-price" id="total-calc">0 ₫</span></div>

                <button type="button" class="btn-payment btn-block" id="btn-submit-booking" disabled>
                    Tiếp tục thanh toán <i class="fa-solid fa-chevron-right ms-1"></i>
                </button>
            </div>

            <div class="ticket-info-card">
                <h3 class="summary-title"><i class="fa-solid fa-ticket me-2 text-pink"></i> Thông tin hạng vé</h3>
                <div class="summary-divider"></div>
                <div id="ticket-types-container">
                    <div class="ticket-type-item" th:each="ticketType : ${event.ticketTypes}">
                        <div>
                            <div class="ticket-type-name" th:text="${ticketType.zoneName}">VIP</div>
                            <div class="ticket-type-desc">
                                <span th:text="${ticketType.description}"></span><br>
                                <small class="text-success" th:text="'Còn ' + (${ticketType.totalQuantity - ticketType.soldQuantity}) + ' vé'">Còn 50 vé</small>
                            </div>
                        </div>
                        <div class="ticket-type-price" style="white-space: nowrap; flex-shrink: 0; font-weight: 700; color: #ff4d8d;">
                            <span th:text="${ticketType.price != null ? #numbers.formatDecimal(ticketType.price, 0, 'POINT', 0, 'COMMA') + ' đ' : 'Free'}">Từ 2.000.000 đ</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{homepage/fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/homepage/js/footer.js}"></script>
<script th:src="@{/homepage/js/header.js}"></script>
<script th:src="@{/homepage/js/choose_seat.js}"></script>
</body>
</html>
