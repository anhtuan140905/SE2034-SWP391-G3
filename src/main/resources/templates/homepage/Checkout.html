<!DOCTYPE html>
<html lang="en" xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/homepage/css/check_out.css}"/>
</head>
<body>

<div class="container py-4">
    <div class="checkout-container">
        <div class="card card-checkout">

            <div class="order-title">
                ĐƠN HÀNG #<span th:text="${order.orderId}">12345</span>
            </div>

            <div class="info-box">
                <div class="info-row">
                    <span class="info-label">Tổng tiền đơn hàng</span>
                    <span class="info-value text-danger" th:text="${order.totalAmount}">0đ</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Trạng thái</span>
                    <span class="badge-status" th:text="${order.status}">Chờ thanh toán</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Mã thanh toán</span>
                    <span class="info-value text-primary" th:text="${payment.paymentCode}">PAY123</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Số tiền cần chuyển</span>
                    <span class="info-value text-success fs-5" th:text="${payment.amount}">0đ</span>
                </div>
            </div>

            <div class="qr-container text-center my-4">
                <h5>Quét mã QR sau để thực hiện thanh toán:</h5>

                <img th:src="|https://img.vietqr.io/image/MB-123456789999-qr_only.png?amount=${order.totalAmount}&addInfo=EVH${order.orderId}|"
                     alt="Mã QR Thanh Toán"
                     class="img-fluid my-2"
                     style="max-width: 250px; border: 1px solid #ddd; padding: 10px; background: #fff;" />

                <div class="mt-2">
                    <small class="text-muted">Nội dung chuyển khoản: <strong th:text="|EVH${order.orderId}|">EVH17</strong></small>
                </div>
            </div>

            <div class="summary-divider"></div>

            <div class="d-grid gap-2 mt-4">
                <button type="button" class="btn btn-success btn-lg" id="btn-confirm-payment">
                    <i class="fa-solid fa-circle-check me-2"></i> Tôi đã thanh toán xong
                </button>

                <a th:href="@{/events}" class="btn btn-outline-secondary btn-sm">
                    Hủy đơn hàng
                </a>
            </div>

            <div class="text-center mt-4">
                <small class="text-muted">Hệ thống sẽ tự động cập nhật sau khi nhận được tiền.</small>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/homepage/js/checkout.js}"></script>

</body>
</html>
