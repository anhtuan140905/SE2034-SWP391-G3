<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Vé – EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/homepage/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/header.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/detail.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/tickets.css}" />
</head>
<body class="detail-page">

<div class="background-glows">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>
</div>


<div th:replace="~{homepage/fragments/header :: header('tickets')}">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="brand-dots me-2">
                    <span class="dot pink"></span>
                    <span class="dot violet"></span>
                    <span class="dot orange"></span>
                </div>
                <span class="brand-text text-white">Event<span class="highlight">Hub</span></span>
            </a>
        </div>
    </nav>
</div>

<!-- Detail Screen -->
<div id="detail-screen" class="open">
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Sub-header bên trong detail -->
    <div class="detail-header">
        <div class="detail-header-inner">
            <a class="btn-back" th:href="@{/my-tickets}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5m7-7l-7 7 7 7"/>
                </svg>
                Vé Của Tôi
            </a>
            <span class="detail-title">Chi Tiết Vé</span>
        </div>
    </div>

    <!-- Detail main -->
    <div class="detail-main">
        <!-- Hero image -->
        <div class="detail-hero">
            <img th:src="${orderInfo.thumbnailUrl}"
                 alt="Event Image">
            <div class="detail-hero-overlay"></div>
            <div class="detail-hero-content">
                <div class="hero-cat" id="d-cat" th:text="${orderInfo.categoryName}"></div>

                <div class="ticket-status">
                    <span class="status-dot"></span>
                    <span class="status-text" th:if="${orderInfo.status == 'ACTIVE' }">Còn Hiệu Lực</span>
                    <span class="status-text" th:if="${orderInfo.status == 'USED' }">Đã Sử Dụng</span>
                    <span class="status-text" th:if="${orderInfo.status == 'EXPIRED' }">Hết Hạn</span>
                </div>
                <div class="hero-title" id="d-title" th:text="${orderInfo.eventName}"></div>

            </div>
        </div>

        <div class="detail-grid">
            <!-- Left: event info + order info -->
            <div style="display:flex;flex-direction:column;gap:20px">

                <!-- Thông tin sự kiện -->
                <div class="detail-card">
                    <h3>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                        </svg>
                        Thông Tin Sự Kiện
                    </h3>
                    <div class="info-rows">
                        <div class="info-row">
                            <div class="info-row-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                                </svg>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Ngày & Giờ</div>
                                <div class="info-row-value" id="d-datetime" th:text="${#temporals.format(orderInfo.startTime,'dd/MM/yyyy HH:mm')}"></div>

                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-row-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Địa Điểm</div>
                                <div class="info-row-value" id="d-venue" th:text="${orderInfo.specificAddress} + ', ' + ${orderInfo.wardName} +', ' + ${orderInfo.cityName}" ></div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-row-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
                                </svg>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Loại Vé</div>
                                <div class="info-row-value" id="d-type" th:text="${orderInfo.zoneName}"></div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-row-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Số Lượng</div>
                                <div class="info-row-value" id="d-qty" th:text="${#lists.size(ticketDetail) + ' vé'}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Thông tin đơn hàng -->
                <div class="detail-card">
                    <h3>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        Thông Tin Đơn Hàng
                    </h3>
                    <div class="order-rows">
                        <div class="order-row">
                            <span>Mã Đơn Hàng</span>
                            <strong id="d-order" th:text="${orderInfo.orderId}"></strong>
                        </div>
                        <div class="order-row">
                            <span>Ngày Đặt Vé</span>
                            <strong id="d-purchase" th:text="${orderInfo.createdAt}"></strong>
                        </div>
                        <div class="order-row">
                            <span>Phương Thức Thanh Toán</span>
                            <strong th:text="${orderInfo.paymentCode}">N/A</strong>
                        </div>
                    </div>
                    <div class="total-row">
                        <span>Tổng Thanh Toán</span>
                        <strong id="d-price" th:text="${#numbers.formatDecimal(orderInfo.price, 1, 'POINT', 0, 'DEFAULT') + ' đ'}" ></strong>
                    </div>
                </div>
            </div>

            <!-- Right: QR Ticket -->
            <div style="display:flex;flex-direction:column;gap:16px"
                 th:each="ticket : ${ticketDetail}">
                <div class="qr-ticket">
                    <div class="qr-ticket-header">
                        <p>Vé Điện Tử</p>
                        <strong id="d-ticketid" th:text="${ticket.ticketCode}">N/A</strong>
                    </div>
                    <div class="qr-body">
                        <div class="qr-wrap">
                            <svg class="qr-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

                            </svg>
                        </div>

                        <div class="qr-id" id="d-qrid" th:text="${ticket.qrCode}"></div>


                        <div class="seat-grid">
                            <div class="seat-item">
                                <div class="seat-val" id="d-section" th:text="${ticket.zoneName}">N/A</div>
                                <div class="seat-lbl">Khu Vực</div>
                            </div>
                            <div class="seat-item">
                                <div class="seat-val" id="d-row" th:text="${ticket.row}">N/A</div>
                                <div class="seat-lbl">Hàng</div>
                            </div>
                            <div class="seat-item">
                                <div class="seat-val" id="d-seat" th:text="${ticket.seat}">N/A</div>
                                <div class="seat-lbl">Ghế</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{homepage/fragments/footer :: footer}">
    <footer class="py-4 mt-5 text-center text-secondary border-top border-dark">
        <div class="container">
            <p class="mb-0">&copy; 2026 EventHub. All rights reserved.</p>
        </div>
    </footer>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/homepage/js/header.js}"></script>
<script th:src="@{/homepage/js/footer.js}"></script>
</body>
</html>
