<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi Tiết Vé – EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
          rel="stylesheet"/>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/homepage/css/variables.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/detail.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/tickets.css}"/>
</head>
<body class="detail-page">

<div class="background-glows">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>
</div>


<div th:replace="~{homepage/fragments/header :: header('tickets')}">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="brand-dots me-2">
                    <span class="dot pink"></span>
                    <span class="dot violet"></span>
                    <span class="dot orange"></span>
                </div>
                <span class="brand-text text-white">Event<span class="highlight">Hub</span></span>
            </a>
        </div>
    </nav>
</div>

<!-- Detail Screen -->
<div id="detail-screen" class="open">
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Sub-header bên trong detail -->
    <div class="detail-header">
        <div class="detail-header-inner">
            <a class="btn-back" th:href="@{/my-tickets}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                     stroke-width="2">
                    <path d="M19 12H5m7-7l-7 7 7 7"/>
                </svg>
                Vé Của Tôi
            </a>
            <span class="detail-title">Chi Tiết Vé</span>
        </div>
    </div>


    <div class="detail-main">

        <div class="detail-hero">
            <img th:src="${ticketDetail.thumbnailUrl}" alt="Event Image">
            <div class="detail-hero-overlay"></div>
            <div class="detail-hero-content">
                <div class="hero-cat" th:text="${ticketDetail.categoryName}"></div>
                <div class="hero-title" th:text="${ticketDetail.eventName}"></div>
            </div>
        </div>


        <div class="qr-tickets-grid">
            <div class="qr-ticket" >

                <div class="qr-ticket-header">
    <span class="status-pill"
          th:classappend="${ticketDetail.status == 'USED'} ? 'used' : (${ticketDetail.status == 'EXPIRED'} ? 'expired' : 'active')">
        <span class="status-dot"></span>
        <span class = "status-active" th:if="${ticketDetail.status == 'ACTIVE'}">Còn hiệu lực</span>
        <span class = "status-used" th:if="${ticketDetail.status == 'USED'}">Đã sử dụng</span>
        <span class = "status-expired" th:if="${ticketDetail.status == 'EXPIRED'}">Hết hạn</span>
    </span>
                </div>

                <div class="qr-body">
                    <div class="qr-body-left">
                        <div class="info-row">
                            <div class="info-row-icon">
                                <i class="ti ti-ticket" aria-hidden="true"></i>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Mã vé</div>
                                <div class="info-row-value" th:text="${ticketDetail.ticketCode}"></div>
                            </div>
                        </div>

                        <div class="info-row">
                            <div class="info-row-icon">
                                <i class="ti ti-calendar" aria-hidden="true"></i>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Thời gian</div>
                                <div class="info-row-value">
                                    <span th:text="${'Từ ' + #temporals.format(ticketDetail.startTime,'HH:mm EEEE, dd/MM/yyyy', new java.util.Locale('vi'))}"></span>
                                </div>
                                <div class="info-row-value">
                                    <span th:text="${'Đến ' + #temporals.format(ticketDetail.endTime,'HH:mm EEEE, dd/MM/yyyy', new java.util.Locale('vi'))}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="info-row">
                            <div class="info-row-icon">
                                <i class="ti ti-armchair" aria-hidden="true"></i>
                            </div>
                            <div class="info-row-text">
                                <div class="info-row-label">Số ghế</div>
                                <div class="info-row-value"
                                     th:text="${ticketDetail.row != null} ? (${ticketDetail.row} + '-' + ${ticketDetail.seat}) : ${ticketDetail.zoneName}"></div>
                            </div>
                        </div>
                    </div>

                    <div class="qr-separator-vertical"></div>

                    <div class="qr-body-right">
                        <div class="qr-wrap">
                            <img th:if="${ticketDetail.qrCode != null}"
                                 th:src="${ticketDetail.qrCode}"
                                 alt="QR Code"
                                 style="width:100%;height:100%;object-fit:contain;"/>
                        </div>
                    </div>
                </div>

                <div class="qr-ticket-footer">
                    <span class="foot-label">Mã đơn hàng</span>
                    <span class="foot-value" th:text="${ticketDetail.orderId}"></span>
                </div>

            </div>
        </div>

    </div>
</div>

<div th:replace="~{homepage/fragments/footer :: footer}">
    <footer class="py-4 mt-5 text-center text-secondary border-top border-dark">
        <div class="container">
            <p class="mb-0">&copy; 2026 EventHub. All rights reserved.</p>
        </div>
    </footer>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/homepage/js/header.js}"></script>
<script th:src="@{/homepage/js/footer.js}"></script>
</body>
</html>
