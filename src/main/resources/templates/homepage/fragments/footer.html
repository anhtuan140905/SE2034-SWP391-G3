<!-- Thymeleaf Fragment: Footer -->
<footer th:fragment="footer" xmlns:th="http://www.thymeleaf.org">
    <div class="footer-glow-wrapper">
        <div class="footer-glow-circle circle-left"></div>
        <div class="footer-glow-circle circle-right"></div>
    </div>
    <div class="container footer-content-wrap d-flex">
        <div class="row gy-5 align-items-center justify-content-center">
            <!-- Brand Column -->
            <div class="col-lg-12 col-md-12">
                <a class="d-flex align-items-center mb-3 footer-brand" href="#" th:href="@{/home}">
                    <div class="brand-dots me-2">
                        <span class="dot pink"></span>
                        <span class="dot violet"></span>
                        <span class="dot orange"></span>
                    </div>
                    <span class="brand-text text-white">Event<span class="highlight">Hub</span></span>
                </a>
                <p class="footer-tagline text-secondary-light pe-lg-4" style="color: white !important;">
                    Nâng tầm trải nghiệm sự kiện của bạn thông qua công nghệ tiên tiến, giao diện trực quan và khả năng khám phá sự kiện sống động. Kết nối, gặp gỡ và làm chủ sự kiện cùng nhau.
                </p>
            </div>
        </div>

        <hr class="footer-divider">

        <div class="row align-items-center footer-bottom">
            <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                <p class="copyright mb-0" style="color: white !important;">
                    &copy; <span id="currentYear">2026</span> EventHub. Bảo lưu mọi quyền. Được thiết kế dành cho các <i class="fa-solid fa-heart text-danger pulse"></i>nhà sáng tạo chuyên nghiệp.
                </p>
            </div>
        </div>
    </div>
</footer>
