<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Trang không tồn tại | EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/homepage/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/homepage/css/footer.css}"/>
    <style>
        /* Giữ nguyên 100% CSS Glassmorphism & Pulse Ring từ trang 403 của bạn */
        .error-section { min-height: 70vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; padding: 4rem 1rem; }
        .error-card { background: var(--glass-background); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 3rem 2rem; max-width: 600px; width: 100%; text-align: center; box-shadow: var(--glass-shadow); transition: transform 0.3s ease, border-color 0.3s ease; }
        .error-card:hover { border-color: var(--glass-border-hover); transform: translateY(-5px); }
        .error-code { font-size: 8rem; font-weight: 800; line-height: 1; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem; font-family: var(--font-heading); letter-spacing: -0.05em; display: inline-block; }
        .error-title { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem; font-family: var(--font-heading); }
        .error-desc { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2.5rem; line-height: 1.6; }
        .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .error-icon-wrap { width: 80px; height: 80px; border-radius: 50%; background: rgba(255, 42, 122, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--color-pink); font-size: 2.5rem; border: 1px solid rgba(255, 42, 122, 0.2); animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255, 42, 122, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 42, 122, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 42, 122, 0); } }
    </style>
</head>
<body>
<div class="background-glows">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>
</div>

<div th:replace="~{homepage/fragments/header :: header('error')}"></div>

<main class="error-section">
    <div class="container d-flex justify-content-center">
        <div class="error-card">
            <div class="error-code">404</div>
            <h1 class="error-title">Trang không tồn tại</h1>
            <p class="error-desc">
                Rất tiếc! Đường dẫn bạn truy cập không tồn tại hoặc đã bị di chuyển.
                Vui lòng kiểm tra lại địa chỉ URL hoặc quay lại trang chủ.
            </p>
            <div class="error-actions">
                <a th:href="@{/}" class="btn-grad-cta">
                    <i class="fa-solid fa-house"></i> Quay lại trang chủ
                </a>
                <button onclick="history.back()" class="btn-glass-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại trang trước
                </button>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{homepage/fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/homepage/js/header.js}"></script>
</body>
</html>
