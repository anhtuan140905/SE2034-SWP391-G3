<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vé Của Tôi – EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/homepage/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/header.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/homepage/css/tickets.css}" />

</head>
<body>



<div class="background-glows">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>
</div>


<div th:replace="~{homepage/fragments/header :: header('tickets')}">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="brand-dots me-2">
                    <span class="dot pink"></span>
                    <span class="dot violet"></span>
                    <span class="dot orange"></span>
                </div>
                <span class="brand-text text-white">Event<span class="highlight">Hub</span></span>
            </a>
        </div>
    </nav>
</div>


<!-- ── MAIN ── -->
<main>
    <!-- Page title -->
    <div>
        <div class="page-eyebrow">
        </div>
        <h1>Vé Của Tôi</h1>
        <p class="page-subtitle">Quản lý tất cả vé sự kiện của bạn tại một nơi</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <!-- Tổng số vé -->
        <div class="stat-card" style="padding: 16px 20px;">
            <div class="stat-glow" style="background:radial-gradient(circle,rgba(255,42,122,0.15),transparent)"></div>
            <div class="stat-inner">
                <div class="stat-icon" style="background:linear-gradient(135deg,#ff2a7a,#e91e8c); margin-bottom:8px">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
                    </svg>
                </div>
                <div class="stat-value" th:text="${countTicket}">0</div>
                <strong class="stat-label">Tổng Số Vé</strong>
            </div>
        </div>

        <!-- Sự kiện sắp tới -->
        <div class="stat-card">
            <div class="stat-glow" style="background:radial-gradient(circle,rgba(139,63,243,0.15),transparent)"></div>
            <div class="stat-inner">
                <div class="stat-icon" style="background:linear-gradient(135deg,#8b3ff3,#6d28d9)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div class="stat-value" th:text="${countUpcomingEvent}">0</div>
                <strong class="stat-label">Sự Kiện Sắp Tới</strong>

            </div>
        </div>

        <!-- Sự kiện đã tham dự -->
        <div class="stat-card">
            <div class="stat-glow" style="background:radial-gradient(circle,rgba(241,115,41,0.15),transparent)"></div>
            <div class="stat-inner">
                <div class="stat-icon" style="background:linear-gradient(135deg,#f17329,#e55a1d)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div class="stat-value" th:text="${countAttendedEvent}">0</div>
                <strong class="stat-label">Sự Kiện Đã Tham Dự</strong>

            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">

        <div class="tabs">
            <button class="tab-btn"
                    th:classappend="${param.tab == null or param.tab[0] == 'all'} ? 'active'"
                    onclick="location.href='?tab=all'">
                Tất Cả<span class="tab-count" th:text="${countTicket}">0</span>
            </button>

            <button class="tab-btn"
                    th:classappend="${param.tab != null and param.tab[0] == 'upcoming'} ? 'active'"
                    onclick="location.href='?tab=upcoming'">
                Sắp Tới<span class="tab-count" th:text="${countUpcomingTicket}">0</span>
            </button>

            <button class="tab-btn"
                    th:classappend="${param.tab != null and param.tab[0] == 'used'} ? 'active'"
                    onclick="location.href='?tab=used'">
                Đã Dùng<span class="tab-count" th:text="${countUsedTicket}">0</span>
            </button>

            <button class="tab-btn"
                    th:classappend="${param.tab != null and param.tab[0] == 'expired'} ? 'active'"
                    onclick="location.href='?tab=expired'">
                Hết Hạn<span class="tab-count" th:text="${countExpiredTicket}">0</span>
            </button>
        </div>
    </div>

    <div class="ticket-list">

        <div class="ticket-card"
             th:each="t : ${viewTicket}">

            <!-- LEFT IMAGE -->
            <div class="ticket-img">

                <img th:src="${t.thumbnailUrl}"
                     alt="Event Image">

                <span class="cat-badge"
                      th:text="${t.categoryName}">
            </span>

            </div>

            <!-- CENTER CONTENT -->
            <div class="ticket-content">

                <!-- STATUS -->
                <div class="ticket-status"
                     th:classappend="${t.status == 'ACTIVE'} ? 'status-active' :
                     (${t.status == 'USED'} ? 'status-used' : 'status-expired')">

                    <span class="status-dot"></span>

                    <span class="status-text" th:if="${t.status == 'ACTIVE' }">Còn Hiệu Lực</span>
                    <span class="status-text" th:if="${t.status == 'USED' }">Đã Sử Dụng</span>
                    <span class="status-text" th:if="${t.status == 'EXPIRED' }">Hết Hạn</span>

                </div>

                <!-- EVENT NAME -->
                <h2 class="ticket-title"
                    th:text="${t.eventName}">

                </h2>

                <!-- EVENT INFO -->
                <div class="ticket-meta">

                    <div class="meta-item">
                        <i class="fa-regular fa-calendar"></i>

                        <span th:text="${#temporals.format(t.startTime,'dd/MM/yyyy HH:mm')}"></span>

                    </div>

                </div>

                <!-- ADDRESS -->
                <div class="ticket-address">

                    <span th:text="${t.specificAddress}"></span>

                    <span th:if="${t.wardName != null}">
                    , <span th:text="${t.wardName}"></span>
                </span>

                    <span th:if="${t.cityName != null}">
                    , <span th:text="${t.cityName}"></span>
                </span>

                </div>

                <!-- TICKET INFO -->
                <div class="ticket-bottom">

                    <div class="ticket-type-badge"
                         th:text="${t.zoneName}">

                    </div>

                    <div class="ticket-detail">

                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="ticket-right">

                <div class="ticket-price">
                    <span th:text="${#numbers.formatDecimal(t.price, 1, 'POINT', 0, 'DEFAULT') + ' đ'}"></span>

                </div>

                <a class="btn-detail"
                   th:href="@{/my-detailtickets(ticketId = ${t.ticketId})}">
                    Xem Chi Tiết
                </a>

            </div>

        </div>

    </div>



</main>




<div th:replace="~{homepage/fragments/footer :: footer}">
    <!-- Static Fallback for local files inspection -->
    <footer class="py-4 mt-5 text-center text-secondary border-top border-dark">
        <div class="container">
            <p class="mb-0">&copy; 2026 EventHub. All rights reserved.</p>
        </div>
    </footer>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/homepage/js/header.js}"></script>
<script th:src="@{/homepage/js/footer.js}"></script>
<script th:src="@{/homepage/js/tickets.js}"></script>

</body>
</html>
