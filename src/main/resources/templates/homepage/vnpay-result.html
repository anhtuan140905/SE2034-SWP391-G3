<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="max-width:480px; width:100%;">
        <div class="card-body text-center p-4">

            <div th:if="${success}">
                <div class="text-success mb-3" style="font-size:3rem;">&#10004;</div>
                <h4 class="text-success">Thanh toán thành công</h4>
                <p class="text-muted">Đơn hàng của bạn đã được xác nhận.</p>
            </div>

            <div th:unless="${success}">
                <div class="text-danger mb-3" style="font-size:3rem;">&#10006;</div>
                <h4 class="text-danger">Thanh toán thất bại</h4>
                <p class="text-muted" th:text="${message} ?: 'Giao dịch không thành công. Vui lòng thử lại.'"></p>
            </div>

            <table class="table table-sm text-start mt-3">
                <tbody>
                <tr th:if="${order != null}">
                    <td class="text-muted">Mã đơn hàng</td>
                    <td class="text-end fw-semibold" th:text="${order.id}"></td>
                </tr>
                <tr th:if="${order != null}">
                    <td class="text-muted">Số tiền</td>
                    <td class="text-end fw-semibold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                </tr>
                <tr th:if="${vnp_TxnRef != null}">
                    <td class="text-muted">Mã giao dịch (TxnRef)</td>
                    <td class="text-end" th:text="${vnp_TxnRef}"></td>
                </tr>
                <tr th:if="${vnp_TransactionNo != null}">
                    <td class="text-muted">Mã VNPay</td>
                    <td class="text-end" th:text="${vnp_TransactionNo}"></td>
                </tr>
                </tbody>
            </table>

            <a th:href="@{/}" class="btn btn-primary w-100 mt-2">Về trang chủ</a>
            <a th:if="${order != null}" th:href="@{'/orders/' + ${order.id}}" class="btn btn-outline-secondary w-100 mt-2">Xem đơn hàng</a>

        </div>
    </div>
</div>
</body>
</html>
