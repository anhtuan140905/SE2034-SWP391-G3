<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
</head>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table width="480" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:8px; overflow:hidden;
                          box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

                <!-- Header -->
                <tr>
                    <td style="background:#e74c3c; padding: 24px 32px;">
                        <h1 style="margin:0; color:#ffffff; font-size:24px;">EventHub</h1>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding: 32px;">
                        <p style="margin:0 0 8px; color:#333;">Xin chào <strong th:text="${fullName}">Người dùng</strong>,</p>
                        <p style="color:#555;">Chúng tôi nhận được yêu cầu đặt lại mật khẩu cho tài khoản của bạn.</p>
                        <p style="color:#555;">Mã OTP của bạn là:</p>

                        <!-- OTP Box -->
                        <div style="text-align:center; margin: 24px 0;">
                            <span th:text="${otp}"
                                  style="font-size:40px; font-weight:bold; letter-spacing:12px;
                                         color:#e74c3c; border:2px dashed #e74c3c;
                                         padding: 12px 24px; border-radius:8px;">
                                000000
                            </span>
                        </div>

                        <p style="color:#555;">
                            Mã có hiệu lực trong
                            <strong>5</strong> phút.
                        </p>
                        <p style="color:#999; font-size:13px;">
                            Nếu bạn không yêu cầu đặt lại mật khẩu, hãy bỏ qua email này.
                            Tài khoản của bạn vẫn an toàn.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f9f9f9; padding: 16px 32px;
                               border-top: 1px solid #eee; text-align:center;">
                        <p style="margin:0; color:#aaa; font-size:12px;">
                            © 2026 EventHub. All rights reserved.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
