<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Event Category</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            min-height:100vh;
            background:#090014;
            color:white;
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
            width:260px;
            background:#140021;
            border-right:1px solid rgba(236,72,153,0.3);
            padding:20px;
            position:fixed;
            top:0;
            left:0;
            height:100vh;
            z-index:100;
        }

        .logo-section{
            margin-bottom:40px;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            margin-bottom:5px;
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .portal-text{
            font-size:13px;
            color:#9ca3af;
            letter-spacing:1px;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:12px;
            text-decoration:none;
            color:#d1d5db;
            padding:14px 16px;
            border-radius:12px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .menu a:hover,
        .menu a.active{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            color:white;
        }

        /* ================= WRAPPER ================= */

        .wrapper{
            margin-left:260px;
            flex:1;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        /* ================= TOPBAR ================= */

        .topbar{
            position:sticky;
            top:0;
            z-index:90;
            background:#0d001a;
            border-bottom:1px solid rgba(236,72,153,0.2);
            padding:12px 25px;
            display:flex;
            align-items:center;
            gap:16px;
        }

        .search-box{
            flex:1;
            max-width:500px;
            background:#140021;
            border:1px solid rgba(236,72,153,0.25);
            border-radius:10px;
            padding:10px 15px;
            color:white;
            outline:none;
            font-size:14px;
        }

        .search-box::placeholder{
            color:#9ca3af;
        }

        .topbar-right{
            margin-left:auto;
            display:flex;
            align-items:center;
            gap:18px;
        }

        .notif-btn{
            position:relative;
            background:none;
            border:none;
            color:#d1d5db;
            font-size:20px;
            cursor:pointer;
        }

        .notif-btn .dot{
            position:absolute;
            top:0;
            right:0;
            width:9px;
            height:9px;
            background:#ff1b8d;
            border-radius:50%;
            border:2px solid #0d001a;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
        }

        .profile img{
            width:42px;
            height:42px;
            border-radius:50%;
            border:2px solid #ff1b8d;
            object-fit:cover;
        }

        .profile-info{ line-height:1.3; }
        .profile-info .name{ font-size:14px; font-weight:bold; color:white; }
        .profile-info .role{ font-size:12px; color:#9ca3af; }

        /* ================= MAIN ================= */

        .main{
            flex:1;
            padding:25px;
        }

        /* ================= PAGE HEADER ================= */

        .page-header{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:25px;
        }

        .back-btn{
            width:42px;
            height:42px;
            border-radius:10px;
            border:1px solid rgba(236,72,153,0.3);
            background:#140021;
            color:white;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:0.3s;
            flex-shrink:0;
        }

        .back-btn:hover{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            transform:scale(1.05);
        }

        .page-header-text h1{ font-size:26px; font-weight:bold; }
        .page-header-text p{ color:#9ca3af; margin-top:5px; }

        /* ================= FORM ================= */

        .form-box{
            background:#140021;
            border:1px solid rgba(236,72,153,0.25);
            border-radius:20px;
            padding:30px;
            max-width:700px;
            box-shadow:0 0 25px rgba(255,27,141,0.08);
        }

        .form-title{
            margin-bottom:25px;
        }

        .form-title h2{
            font-size:20px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            color:#d1d5db;
            font-size:14px;
        }

        input[type="text"], textarea, select{
            width:100%;
            padding:12px 14px;
            border-radius:12px;
            border:1px solid rgba(236,72,153,0.3);
            background:#090014;
            color:white;
            outline:none;
            transition:0.2s;
            font-size:14px;
        }

        textarea{
            height:120px;
            resize:none;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus{
            border-color:#ff1b8d;
            box-shadow:0 0 10px rgba(255,27,141,0.25);
        }

        select option{
            background:#140021;
        }

        .btn-group{
            display:flex;
            gap:12px;
        }

        .submit-btn, .cancel-btn{
            flex:1;
            padding:14px;
            border:none;
            border-radius:12px;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            color:white;
        }

        .submit-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(236,72,153,0.3);
        }

        .cancel-btn{
            background:transparent;
            color:#d1d5db;
            border:1px solid rgba(236,72,153,0.3) !important;
        }

        .cancel-btn:hover{
            background:rgba(236,72,153,0.1);
            border-color:rgba(236,72,153,0.6) !important;
            transform:translateY(-2px);
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:900px){
            .sidebar{ width:220px; }
            .wrapper{ margin-left:220px; }
        }

        @media(max-width:600px){
            .sidebar{ display:none; }
            .wrapper{ margin-left:0; }
        }

    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <div class="logo-section">
        <div class="logo">EventHub</div>
        <div class="portal-text">Admin Portal</div>
    </div>

    <div class="menu">

        <a href="#">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>

        <a href="#">
            <i class="fa-solid fa-building"></i>
            Manage Venues
        </a>

        <a href="#">
            <i class="fa-solid fa-users"></i>
            Manage Users
        </a>

        <a href="#" class="active">
            <i class="fa-solid fa-tags"></i>
            Event Categories
        </a>

        <a href="#">
            <i class="fa-solid fa-chart-pie"></i>
            Analytics
        </a>

        <a href="#">
            <i class="fa-solid fa-gear"></i>
            Settings
        </a>

    </div>

</div>

<!-- ================= WRAPPER ================= -->
<div class="wrapper">

    <!-- TOPBAR -->
    <div class="topbar">

        <input type="text" class="search-box" placeholder="Search events, venues, users..."/>

        <div class="topbar-right">

            <button class="notif-btn" aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="dot"></span>
            </button>

            <div class="profile">
                <img src="https://i.pravatar.cc/100?img=12" alt="Admin User"/>
                <div class="profile-info">
                    <div class="name">Admin User</div>
                    <div class="role">Super Admin</div>
                </div>
            </div>

        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">

            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <div class="page-header-text">
                <h1>Add Event Category</h1>
                <p>Create a new category for events</p>
            </div>

        </div>

        <!-- FORM -->
        <div class="form-box">

            <div class="form-title">
                <h2>Category Details</h2>
            </div>

            <form>

                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" placeholder="Enter category name">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea placeholder="Enter category description"></textarea>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="submit" class="submit-btn">
                        Save Category
                    </button>
                    <button type="button" class="cancel-btn" onclick="history.back()">
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div><!-- /main -->

</div><!-- /wrapper -->

</body>
</html>
