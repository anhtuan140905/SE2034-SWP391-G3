
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event Category</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#090014;
            color:white;
            padding:30px;
        }

        .header{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }

        .back-btn{
            width:45px;
            height:45px;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,0.08);
            color:white;
            cursor:pointer;
            font-size:18px;
        }

        .back-btn:hover{
            background:rgba(236,72,153,0.2);
        }

        .header h1{
            font-size:32px;
            margin-bottom:5px;
        }

        .header p{
            color:#9ca3af;
        }

        .card{
            max-width:850px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(236,72,153,0.3);
            border-radius:20px;
            padding:30px;
            backdrop-filter:blur(10px);
        }

        .card h2{
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:25px;
        }

        .form-group label{
            display:block;
            margin-bottom:10px;
            font-weight:bold;
        }

        .input-box,
        textarea,
        select{
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid rgba(236,72,153,0.3);
            background:rgba(20,0,33,0.4);
            color:white;
            outline:none;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:140px;
        }

        .icon-grid{
            display:grid;
            grid-template-columns:repeat(6,1fr);
            gap:15px;
            margin-top:15px;
        }

        .icon-box{
            height:70px;
            border-radius:15px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(236,72,153,0.2);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            font-size:24px;
            transition:0.3s;
        }

        .icon-box:hover{
            background:rgba(236,72,153,0.15);
            transform:translateY(-3px);
        }

        .active-icon{
            background:linear-gradient(135deg,#ff1b8d,#ec4899);
            border:none;
        }

        .button-group{
            display:flex;
            gap:15px;
            margin-top:30px;
        }

        .save-btn{
            background:linear-gradient(135deg,#ff1b8d,#ec4899);
            border:none;
            padding:14px 24px;
            border-radius:12px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .cancel-btn{
            background:transparent;
            border:1px solid rgba(236,72,153,0.4);
            padding:14px 24px;
            border-radius:12px;
            color:white;
            cursor:pointer;
        }

        .save-btn:hover,
        .cancel-btn:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

<div class="header">

    <button class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <div>
        <h1>Add Event Category</h1>
        <p>Create a new category for events</p>
    </div>

</div>

<div class="card">

    <h2>Category Information</h2>

    <form>

        <div class="form-group">
            <label>Category Name</label>

            <input
                    type="text"
                    class="input-box"
                    placeholder="Enter category name"
            >
        </div>

        <div class="form-group">
            <label>Description</label>

            <textarea placeholder="Enter category description..."></textarea>
        </div>

        <div class="form-group">
            <label>Status</label>

            <select>
                <option selected>Active</option>
                <option>Inactive</option>
            </select>
        </div>

        <div class="form-group">
            <label>Select Category Icon</label>

            <div class="icon-grid">

                <div class="icon-box active-icon">
                    <i class="fa-solid fa-music"></i>
                </div>

                <div class="icon-box">
                    <i class="fa-solid fa-utensils"></i>
                </div>

                <div class="icon-box">
                    <i class="fa-solid fa-briefcase"></i>
                </div>

                <div class="icon-box">
                    <i class="fa-solid fa-palette"></i>
                </div>

                <div class="icon-box">
                    <i class="fa-solid fa-football"></i>
                </div>

                <div class="icon-box">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>

            </div>
        </div>

        <div class="button-group">

            <button type="submit" class="save-btn">
                <i class="fa-solid fa-plus"></i>
                Add Category
            </button>

            <button type="button" class="cancel-btn">
                Cancel
            </button>

        </div>

    </form>

</div>

</body>
</html>
