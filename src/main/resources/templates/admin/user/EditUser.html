<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit User</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#090014;
            color:white;
            min-height:100vh;
            display:flex;
        }

        /* Sidebar */

        .sidebar{
            width:260px;
            background:rgba(20,0,33,0.95);
            border-right:1px solid rgba(236,72,153,0.3);
            padding:25px;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            margin-bottom:40px;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:12px;
            padding:14px 16px;
            margin-bottom:10px;
            text-decoration:none;
            color:#d1d5db;
            border-radius:12px;
            transition:0.3s;
        }

        .menu a:hover,
        .menu a.active{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            color:white;
        }

        /* Main */

        .main{
            flex:1;
            padding:30px;
        }

        .topbar{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }

        .back-btn{
            width:45px;
            height:45px;
            border:none;
            border-radius:12px;
            background:rgba(236,72,153,0.15);
            color:white;
            cursor:pointer;
            font-size:18px;
            transition:0.3s;
        }

        .back-btn:hover{
            background:#ec4899;
        }

        .topbar h1{
            font-size:32px;
            margin-bottom:5px;
        }

        .topbar p{
            color:#9ca3af;
        }

        /* Card */

        .card{
            max-width:850px;
            background:rgba(20,0,33,0.6);
            border:1px solid rgba(236,72,153,0.3);
            border-radius:22px;
            padding:30px;
        }

        .card h2{
            margin-bottom:30px;
            font-size:24px;
        }

        /* Avatar */

        .avatar-upload{
            text-align:center;
            margin-bottom:35px;
        }

        .avatar-upload img{
            width:130px;
            height:130px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #ec4899;
            margin-bottom:15px;
        }

        .upload-btn{
            display:inline-block;
            padding:10px 18px;
            background:rgba(236,72,153,0.15);
            border:1px solid rgba(236,72,153,0.3);
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .upload-btn:hover{
            background:#ec4899;
        }

        input[type=file]{
            display:none;
        }

        /* Form */

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:22px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group.full{
            grid-column:1 / 3;
        }

        label{
            margin-bottom:10px;
            color:#f3f4f6;
            font-size:15px;
        }

        input,
        select,
        textarea{
            padding:14px;
            border-radius:12px;
            border:1px solid rgba(236,72,153,0.25);
            background:rgba(255,255,255,0.05);
            color:white;
            outline:none;
            transition:0.3s;
        }

        textarea{
            resize:none;
            height:120px;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#ff1b8d;
            box-shadow:0 0 10px rgba(255,27,141,0.3);
        }

        option{
            background:#140021;
        }

        /* Buttons */

        .actions{
            display:flex;
            gap:15px;
            margin-top:35px;
        }

        .save-btn{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            border:none;
            color:white;
            padding:14px 24px;
            border-radius:12px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }

        .save-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 0 15px rgba(255,27,141,0.5);
        }

        .cancel-btn{
            background:transparent;
            border:1px solid rgba(236,72,153,0.3);
            color:white;
            padding:14px 24px;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .cancel-btn:hover{
            background:rgba(236,72,153,0.15);
        }

    </style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">EventHub</div>

    <div class="menu">
        <a href="DashboardAdmin.html">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>

        <a href="ListVenue.html">
            <i class="fa-solid fa-building"></i>
            Manage Venues
        </a>

        <a href="ListUser.html" class="active">
            <i class="fa-solid fa-users"></i>
            Manage Users
        </a>

        <a href="List Event category.html">
            <i class="fa-solid fa-tags"></i>
            Event Categories
        </a>
    </div>

</div>

<!-- Main -->

<div class="main">

    <!-- Header -->

    <div class="topbar">

        <button class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div>
            <h1>Edit User</h1>
            <p>Update user profile and account information</p>
        </div>

    </div>

    <!-- Card -->

    <div class="card">

        <h2>User Information</h2>

        <!-- Avatar -->

        <div class="avatar-upload">

            <img src="https://i.pravatar.cc/300?img=12" alt="User Avatar">

            <br>

            <label class="upload-btn">
                <i class="fa-solid fa-upload"></i>
                Change Avatar
                <input type="file">
            </label>

        </div>

        <!-- Form -->

        <form>

            <div class="form-grid">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" value="Emma Watson">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="emma@gmail.com">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" value="+1 234 567 890">
                </div>

                <div class="form-group">
                    <label>User Role</label>

                    <select>
                        <option>Admin</option>
                        <option selected>Organizer</option>
                        <option>Customer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Status</label>

                    <select>
                        <option selected>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" value="1998-06-12">
                </div>

                <div class="form-group full">
                    <label>Address</label>
                    <input type="text" value="New York, USA">
                </div>

                <div class="form-group full">
                    <label>Bio</label>

                    <textarea>
Professional event organizer with 5+ years of experience managing concerts, conferences, and large public events.
            </textarea>
                </div>

            </div>

            <!-- Buttons -->

            <div class="actions">

                <button type="submit" class="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Changes
                </button>

                <button type="button" class="cancel-btn">
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
