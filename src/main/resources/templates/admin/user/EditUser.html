<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit User</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#090014;
            color:white;
            min-height:100vh;
            display:flex;
        }

        /* Sidebar */

        .sidebar{
            width:260px;
            background:#140021;
            border-right:1px solid rgba(236,72,153,0.3);
            padding:20px;
            position:fixed;
            top:0;
            left:0;
            height:100vh;
            z-index:100;
        }

        .logo-section{ margin-bottom:40px; }

        .logo{
            font-size:28px;
            font-weight:bold;
            margin-bottom:5px;
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .portal-text{
            font-size:13px;
            color:#9ca3af;
            letter-spacing:1px;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:12px;
            text-decoration:none;
            color:#d1d5db;
            padding:14px 16px;
            border-radius:12px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .menu a:hover,
        .menu a.active{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            color:white;
        }
        /* ================= WRAPPER ================= */
        .wrapper{
            margin-left:260px;
            flex:1;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        /* ================= TOPBAR ================= */
        .topbar{
            position:sticky;
            top:0;
            z-index:90;
            background:#0d001a;
            border-bottom:1px solid rgba(236,72,153,0.2);
            padding:12px 25px;
            display:flex;
            align-items:center;
            gap:16px;
        }

        .search-wrap{
            position:relative;
            flex:1;
            max-width:500px;
        }

        .search-wrap i{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:#9ca3af;
            font-size:14px;
        }

        .search-box-top{
            width:100%;
            background:#140021;
            border:1px solid rgba(236,72,153,0.25);
            border-radius:10px;
            padding:10px 15px 10px 40px;
            color:white;
            outline:none;
            font-size:14px;
        }

        .search-box-top::placeholder{ color:#9ca3af; }

        .topbar-right{
            margin-left:auto;
            display:flex;
            align-items:center;
            gap:18px;
        }

        .notif-btn{
            position:relative;
            background:none;
            border:none;
            color:#d1d5db;
            font-size:20px;
            cursor:pointer;
        }

        .notif-btn .dot{
            position:absolute;
            top:0;
            right:0;
            width:9px;
            height:9px;
            background:#ff1b8d;
            border-radius:50%;
            border:2px solid #0d001a;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
        }

        .profile img{
            width:42px;
            height:42px;
            border-radius:50%;
            border:2px solid #ff1b8d;
            object-fit:cover;
        }

        .profile-info{ line-height:1.3; }
        .profile-info .name{ font-size:14px; font-weight:bold; color:white; }
        .profile-info .role{ font-size:12px; color:#9ca3af; }

        /* Main */

        .main{ flex:1; padding:25px; }

        .page-header{
            display:flex;
            align-items:center;
            gap:14px;
            margin-bottom:25px;
        }

        .topbar{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }

        .back-btn{
            width:36px;
            height:36px;
            border-radius:10px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(236,72,153,0.25);
            color:#d1d5db;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            font-size:15px;
            transition:0.2s;
            flex-shrink:0;
        }

        .back-btn:hover{
            background:rgba(255,27,141,0.15);
            color:#ff1b8d;
        }

        .page-header h1{ font-size:26px; font-weight:bold; }
        .page-header p{ color:#9ca3af; margin-top:5px; font-size:14px; }
        /* Card */

        .form-container{
            background:#140021;
            border:1px solid rgba(236,72,153,0.25);
            border-radius:20px;
            padding:30px;
            box-shadow:0 0 25px rgba(255,27,141,0.08);
            max-width:850px;
        }

        .form-title{
            font-size:18px;
            font-weight:bold;
            margin-bottom:25px;
            color:#e5e7eb;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:10px;
            font-weight:bold;
            font-size:14px;
            color:#e5e7eb;
        }

        .form-control{
            width:100%;
            padding:14px 16px;
            background:#090014;
            border:1px solid rgba(236,72,153,0.3);
            border-radius:12px;
            color:white;
            outline:none;
            font-size:14px;
            transition:0.3s;
        }

        .form-control:focus{
            border-color:#ff1b8d;
            box-shadow:0 0 10px rgba(255,27,141,0.15);
        }

        .form-control::placeholder{ color:#6b7280; }

        textarea.form-control{
            resize:none;
            height:150px;
        }

        /* Avatar */

        .avatar-upload{
            text-align:center;
            margin-bottom:35px;
        }

        .avatar-upload img{
            width:130px;
            height:130px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #ec4899;
            margin-bottom:15px;
        }

        .upload-btn{
            display:inline-block;
            padding:10px 18px;
            background:rgba(236,72,153,0.15);
            border:1px solid rgba(236,72,153,0.3);
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .upload-btn:hover{
            background:#ec4899;
        }

        input[type=file]{
            display:none;
        }

        /* Form */

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:22px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group.full{
            grid-column:1 / 3;
        }

        label{
            margin-bottom:10px;
            color:#f3f4f6;
            font-size:15px;
        }

        input,
        select,
        textarea{
            padding:14px;
            border-radius:12px;
            border:1px solid rgba(236,72,153,0.25);
            background:rgba(255,255,255,0.05);
            color:white;
            outline:none;
            transition:0.3s;
        }

        textarea{
            resize:none;
            height:120px;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#ff1b8d;
            box-shadow:0 0 10px rgba(255,27,141,0.3);
        }

        option{
            background:#140021;
        }

        /* Buttons */

        .actions{
            display:flex;
            gap:15px;
            margin-top:35px;
        }

        .save-btn{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            border:none;
            color:white;
            padding:14px 24px;
            border-radius:12px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }

        .save-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 0 15px rgba(255,27,141,0.5);
        }

        .cancel-btn{
            background:transparent;
            border:1px solid rgba(236,72,153,0.3);
            color:white;
            padding:14px 24px;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .cancel-btn:hover{
            background:rgba(236,72,153,0.15);
        }

    </style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo-section">
        <div class="logo">EventHub</div>
        <div class="portal-text">Admin Portal</div>
    </div>

    <div class="menu">
        <a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="#" class="active"><i class="fa-solid fa-building"></i> Manage Venues</a>
        <a href="#"><i class="fa-solid fa-users"></i> Manage Users</a>
        <a href="#"><i class="fa-solid fa-tags"></i> Event Categories</a>
        <a href="#"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
        <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

</div>

<!-- ================= WRAPPER ================= -->
<div class="wrapper">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-box-top" placeholder="Search events, venues, users..."/>
        </div>

        <div class="topbar-right">
            <button class="notif-btn" aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="dot"></span>
            </button>
            <div class="profile">
                <img src="https://i.pravatar.cc/100?img=12" alt="Admin User"/>
                <div class="profile-info">
                    <div class="name">Admin User</div>
                    <div class="role">Super Admin</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <button class="back-btn" aria-label="Back">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h1>Edit User Status</h1>
                <p>Manage user account status</p>
            </div>
        </div>
        <!-- Card -->

        <div class="card">

            <h2>User Information</h2>

            <!-- Avatar -->

            <div class="avatar-upload">

                <img src="https://i.pravatar.cc/300?img=12" alt="User Avatar">

                <br>

                <label class="upload-btn">
                    <i class="fa-solid fa-upload"></i>
                    Change Avatar
                    <input type="file">
                </label>

            </div>

            <!-- Form -->

            <form>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" value="Emma Watson">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" value="emma@gmail.com">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" value="+1 234 567 890">
                    </div>

                    <div class="form-group">
                        <label>User Role</label>

                        <select>
                            <option>Admin</option>
                            <option selected>Organizer</option>
                            <option>Customer</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status</label>

                        <select>
                            <option selected>Active</option>
                            <option>Inactive</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" value="1998-06-12">
                    </div>

                    <div class="form-group full">
                        <label>Address</label>
                        <input type="text" value="New York, USA">
                    </div>

                    <div class="form-group full">
                        <label>Bio</label>

                        <textarea>
Professional event organizer with 5+ years of experience managing concerts, conferences, and large public events.
            </textarea>
                    </div>

                </div>

                <!-- Buttons -->

                <div class="actions">

                    <button type="submit" class="save-btn">

                        Save Changes
                    </button>

                    <button type="button" class="cancel-btn" onclick="history.back()">
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>
</html>
