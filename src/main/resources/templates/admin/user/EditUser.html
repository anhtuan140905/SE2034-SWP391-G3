<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit User</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#fff0f5;
            color:#1e0e34;
            min-height:100vh;
            display:flex;
        }

        /* Sidebar */

        .sidebar{
            width:260px;
            background:#ffffff;
            border-right:1px solid rgba(236,72,153,0.3);
            padding:20px;
            position:fixed;
            top:0;
            left:0;
            height:100vh;
            z-index:100;
        }

        .logo-section{ margin-bottom:40px; }

        .logo{
            font-size:28px;
            font-weight:bold;
            margin-bottom:5px;
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .portal-text{
            font-size:13px;
            color:#84759b;
            letter-spacing:1px;
            font-weight: bold;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:12px;
            text-decoration:none;
            color:#4b3d60;
            padding:14px 16px;
            border-radius:12px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .menu a:hover,
        .menu a.active{
            background:linear-gradient(to right,#ff1b8d,#ec4899);
            color:white;
        }
        /* ================= WRAPPER ================= */
        .wrapper{
            margin-left:260px;
            flex:1;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        /* ================= TOPBAR ================= */
        .topbar{
            position:sticky;
            top:0;
            z-index:90;
            background:#ffffff;
            border-bottom:1px solid rgba(236,72,153,0.2);
            padding:12px 25px;
            display:flex;
            align-items:center;
            gap:16px;
        }

        .search-wrap{
            position:relative;
            flex:1;
            max-width:500px;
        }

        .search-wrap i{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:#9ca3af;
            font-size:14px;
        }

        .search-box-top{
            width:100%;
            background:#fff0f5;
            border:1px solid rgba(236,72,153,0.25);
            border-radius:10px;
            padding:10px 15px 10px 40px;
            color:#1e0e34;
            outline:none;
            font-size:14px;
        }

        .search-box-top::placeholder{
            color:#84759b; }

        .topbar-right{
            margin-left:auto;
            display:flex;
            align-items:center;
            gap:18px;
        }


        .profile{
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
        }

        .profile img{
            width:42px;
            height:42px;
            border-radius:50%;
            border:2px solid #ff1b8d;
            object-fit:cover;
        }

        .profile-info{
            line-height:1.3;
        }
        .profile-info .name{
            font-size:14px;
            font-weight:bold;
            color:#1e0e34;
        }


        /* Main */

        .main{ flex:1; padding:25px; }

        .page-header{
            display:flex;
            align-items:center;
            gap:14px;
            margin-bottom:25px;
        }

        .topbar{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 12px;
            background: #fff0f5;
            color: #4b3d60;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        .back-btn:hover {
            background: rgba(255, 27, 141, 0.15);
            color: #ff1b8d;
        }

        .page-header h1{
            font-size:26px;
            font-weight:bold;
        }

        .page-header p{
            color:#9ca3af;
            margin-top:5px;
            font-size:14px;
        }
        /* Card */


        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:10px;
            font-weight:bold;
            font-size:14px;
            color:#1e0e34;
        }


        /* Avatar */

        .avatar-upload{
            text-align:center;
            margin-bottom:35px;
        }

        .avatar-upload img{
            width:130px;
            height:130px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #ec4899;
            margin-bottom:15px;
        }




        input[type=file]{
            display:none;
        }

        /* Form */

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:22px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group.full{
            grid-column:1 / 3;
        }

        label{
            margin-bottom:10px;
            color:#1e0e34;
            font-size:15px;
        }


        span,
        select,
        textarea {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(236,72,153,0.25);
            background: #fff0f5;
            color: #1e0e34;
            outline: none;
            transition: 0.3s;
        }

        textarea{
            resize:none;
            height:120px;
        }
        span:focus,
        select:focus,
        textarea:focus{
            border-color:#ff1b8d;
            box-shadow:0 0 10px rgba(255,27,141,0.3);
        }

        option{
            background:#ffffff;
            color: #1e0e34;

        }

        /* Buttons */

        .actions{
            display:flex;
            gap:15px;
            margin-top:35px;
        }

        .save-btn{
            padding: 13px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            color: white;
        }

        .save-btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
        }

        .cancel-btn {
            padding: 13px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid rgba(236,72,153,0.3);
            color: #4b3d60;
        }

        .cancel-btn:hover {
            background: rgba(236,72,153,0.08);
            color: #1e0e34;
        }

        .profile-dropdown { position: relative; }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: #ffffff;
            border: 1px solid rgba(255, 42, 122, 0.15);
            border-radius: 14px;
            min-width: 210px;
            box-shadow: 0 8px 24px rgba(255, 27, 141, 0.12);
            z-index: 999;
            overflow: hidden;
            animation: fadeIn 0.2s ease;
        }

        .dropdown-menu.show { display: block; }

        .dropdown-menu ul {
            list-style: none;
            padding: 8px 0;
            margin: 0;
        }

        .dropdown-menu ul li a,
        .dropdown-logout {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: #4b3d60;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
        }

        .dropdown-menu ul li a:hover,
        .dropdown-logout:hover {
            background: rgba(255, 27, 141, 0.07);
            color: #ff1b8d;
        }

        .dropdown-logout { color: #e11d48; }
        .dropdown-logout:hover { background: rgba(225, 29, 72, 0.07); color: #e11d48; }

        .divider {
            border-top: 1px solid rgba(255, 42, 122, 0.1);
            margin: 6px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }



    </style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo-section">
        <div class="logo">EventHub</div>
        <div class="portal-text">Kênh Quản Trị</div>
    </div>

    <div class="menu">
        <a th:href="@{/admin/dashboard}"><i class="fa-solid fa-chart-line"></i> Bảng Điều Khiển </a>
        <a th:href="@{/admin/listuser}" class="active"><i class="fa-solid fa-users"></i> Quản Lý Người Dùng </a>
    </div>

</div>

<!-- ================= WRAPPER ================= -->
<div class="wrapper">

    <!-- TOPBAR -->
    <div class="topbar">

        <div class="topbar-right">


            <div class="profile-dropdown" style="position: relative;">
                <div class="profile" onclick="toggleDropdown()" style="cursor:pointer;">
                    <img th:if="${currentUser != null and currentUser.avatar != null and !currentUser.avatar.isEmpty()}"
                         th:src="${currentUser.avatar}" alt="avatar"/>
                    <img th:unless="${currentUser != null and currentUser.avatar != null and !currentUser.avatar.isEmpty()}"
                         src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="default"/>
                    <div class="profile-info">
                        <div class="name" th:text="${currentUser != null ? currentUser.email : 'Quản Trị Viên'}">
                            Quản Trị Viên
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-down" style="font-size:12px; color:#84759b; margin-left:6px;"></i>
                </div>

                <!-- Dropdown menu -->
                <div class="dropdown-menu" id="profileDropdown">
                    <ul>
                        <li>
                            <a th:href="@{/admin/profile}">
                                <i class="fa-regular fa-user"></i> Thông Tin Của Tôi
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/admin/dashboard}">
                                <i class="fa-solid fa-shield"></i> Kênh Quản Trị
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/settings}">
                                <i class="fa-solid fa-sliders"></i> Cài Đặt
                            </a>
                        </li>
                        <li class="divider"></li>
                        <li>
                            <form method="post" th:action="@{/auth/logout}">
                                <button type="submit" class="dropdown-logout">
                                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng Xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>


        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <a th:href="@{/admin/listuser}">
                <button class="back-btn" aria-label="Back">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </a>
            <div>
                <h1>Cập Nhật Người Dùng </h1>
                <p>Quản Lý Trạng Thái Tài Khoản Người Dùng </p>
            </div>
        </div>
        <!-- Card -->

        <div class="card">

            <h2>Thông Tin Người Dùng</h2>
            <form method="post" enctype="multipart/form-data" th:action="@{/admin/edituser(id=${user.id})}"
                  th:object="${UpdateUserStatusDTO}">

                <!-- Avatar -->

                <div class="avatar-upload">

                    <img th:if="${user != null and user.avatar != null and !user.avatar.isEmpty()}"
                         th:src="${user.avatar}">
                    <img th:unless="${user != null and user.avatar != null and !user.avatar.isEmpty()}"
                         src="https://cdn-icons-png.flaticon.com/512/149/149071.png" />
                    <br>

                </div>

                <!-- Form -->



                <div class="form-grid">

                    <div class="form-group">
                        <label>Họ Và Tên</label>
                        <span th:text="${user.lastName + ' ' + user.middleName + ' ' + user.firstName}"></span>

                    </div>

                    <div class="form-group">
                        <label>Địa Chỉ Email</label>
                        <span th:text="${user.email}"></span>

                    </div>

                    <div class="form-group">
                        <label>Số Điện Thoại</label>
                        <span th:text="${user.phone}"></span>

                    </div>

                    <div class="form-group">
                        <label>Phân Quyền Người Dùng</label>

                        <select name="roleName">
                            <option value="ROLE_MODERATOR" th:selected = "${roleName.name() == 'ROLE_MODERATOR'}">Kiểm duyệt viên</option>
                            <option value="ROLE_FINANCE" th:selected = "${roleName.name() == 'ROLE_FINANCE'}">Nhân viên tài chính</option>
                            <option value="ROLE_ATTENDEE" th:selected = "${roleName.name() == 'ROLE_ATTENDEE'}">Người Dùng</option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label>Trạng Thái Hoạt Động</label>

                        <select name="isActive">
                            <option value="true" th:selected = "${user.isActive == true}">Đang Hoạt Động</option>
                            <option value="false" th:selected = "${user.isActive == false}">Ngừng Hoạt Động</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Ngày Sinh</label>
                        <span th:text="${user.dob}"></span>
                    </div>

                    <div class="form-group full">
                        <label>Địa Chỉ</label>
                        <span th:if="${user.address != null}"
                              th:text="|${user.address.specificAddress}, ${user.address.ward.name}, ${user.address.ward.city.name}|">
                        </span>

                        <span th:unless="${user.address != null}">Chưa cập nhật địa chỉ</span>
                    </div>


                </div>

                <!-- Buttons -->

                <div class="actions">

                    <button type="submit" class="save-btn">

                        Lưu Thay Đổi
                    </button>

                    <button type="button" class="cancel-btn" onclick="history.back()">
                        Hủy
                    </button>

                </div>

            </form>

        </div>

    </div>
    <script>
        function toggleDropdown() {
            document.getElementById('profileDropdown').classList.toggle('show');
        }


        document.addEventListener('click', function(e) {
            const dropdown = document.querySelector('.profile-dropdown');
            if (!dropdown.contains(e.target)) {
                document.getElementById('profileDropdown').classList.remove('show');
            }
        });
    </script>

</body>
</html>
