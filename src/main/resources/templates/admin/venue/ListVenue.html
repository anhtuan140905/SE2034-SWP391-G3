<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>List Venue</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
          rel="stylesheet"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', 'Segoe UI', Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #090014;
            color: white;
        }

        /* ================= SIDEBAR ================= */

        .sidebar {
            width: 260px;
            background: #140021;
            border-right: 1px solid rgba(236, 72, 153, 0.3);
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-text {
            font-size: 13px;
            color: #9ca3af;
            letter-spacing: 1px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #d1d5db;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .menu a:hover,
        .menu a.active {
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            color: white;
        }

        /* ================= WRAPPER ================= */

        .wrapper {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ================= TOPBAR ================= */

        .topbar {
            position: sticky;
            top: 0;
            z-index: 90;
            background: #0d001a;
            border-bottom: 1px solid rgba(236, 72, 153, 0.2);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar .search-box-top {
            flex: 1;
            max-width: 500px;
            background: #140021;
            border: 1px solid rgba(236, 72, 153, 0.25);
            border-radius: 10px;
            padding: 10px 15px;
            color: white;
            outline: none;
            font-size: 14px;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .topbar .search-box-top::placeholder {
            color: #9ca3af;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .notif-btn {
            position: relative;
            background: none;
            border: none;
            color: #d1d5db;
            font-size: 20px;
            cursor: pointer;
        }

        .notif-btn .dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 9px;
            height: 9px;
            background: #ff1b8d;
            border-radius: 50%;
            border: 2px solid #0d001a;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .profile img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #ff1b8d;
            object-fit: cover;
        }

        .profile-info {
            line-height: 1.3;
        }

        .profile-info .name {
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .profile-info .role {
            font-size: 12px;
            color: #9ca3af;
        }

        /* ================= MAIN ================= */

        .main {
            flex: 1;
            padding: 25px;
        }

        /* ================= PAGE HEADER ================= */

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: bold;
        }

        .page-header p {
            color: #9ca3af;
            margin-top: 5px;
        }

        .add-btn {
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Be Vietnam Pro', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
        }

        /* ================= CARD ================= */

        .card {
            background: #140021;
            border: 1px solid rgba(236, 72, 153, 0.25);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(255, 27, 141, 0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .card-header h2 {
            font-size: 18px;
        }

        .search-inline {
            position: relative;
            width: 280px;
        }

        .search-inline input {
            width: 100%;
            padding: 10px 15px 10px 38px;
            border-radius: 10px;
            border: 1px solid rgba(236, 72, 153, 0.3);
            background: #090014;
            color: white;
            outline: none;
            font-size: 14px;
            font-family: 'Be Vietnam Pro', sans-serif;
            transition: 0.2s;
        }

        .search-inline input:focus {
            border-color: #ff1b8d;
            box-shadow: 0 0 10px rgba(255, 27, 141, 0.2);
        }

        .search-inline input::placeholder {
            color: #9ca3af;
        }

        .search-inline i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 13px;
        }

        /* ================= TABLE ================= */

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px;
            color: #9ca3af;
            border-bottom: 1px solid rgba(236, 72, 153, 0.2);
            font-size: 14px;
        }

        td {
            padding: 16px 14px;
            border-bottom: 1px solid rgba(236, 72, 153, 0.1);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(236, 72, 153, 0.05);
        }

        .venue-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .venue-info img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .location,
        .capacity {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d1d5db;
        }

        .event-count {
            color: #c084fc;
            font-weight: bold;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
        }

        .status.active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .status.maintenance {
            background: rgba(234, 179, 8, 0.2);
            color: #facc15;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #d1d5db;
            background: rgba(255, 255, 255, 0.06);
            font-size: 14px;
            transition: 0.2s;
        }

        .view-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            color: #a855f7;
        }

        .edit-btn:hover {
            background: rgba(255, 27, 141, 0.3);
            color: #ff1b8d;
        }

        /* ================= RESPONSIVE ================= */

        @media (max-width: 900px) {
            .sidebar {
                width: 220px;
            }

            .wrapper {
                margin-left: 220px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                display: none;
            }

            .wrapper {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <div class="logo-section">
        <div class="logo">EventHub</div>
        <div class="portal-text">Admin Portal</div>
    </div>

    <div class="menu">
        <a th:href="@{/admin/dashboard}"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="#" class="active"><i class="fa-solid fa-building"></i> Manage Venues</a>
        <a th:href="@{/admin/listuser}"><i class="fa-solid fa-users"></i> Manage Users</a>
        <a href="#"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
        <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

</div>

<!-- ================= WRAPPER ================= -->
<div class="wrapper">

    <!-- TOPBAR -->
    <div class="topbar">

        <input type="text" class="search-box-top" placeholder="Search events, venues, users..."/>

        <div class="topbar-right">

            <button class="notif-btn" aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="dot"></span>
            </button>

            <div class="profile">
                <img src="https://i.pravatar.cc/100?img=12" alt="Admin User"/>
                <div class="profile-info">
                    <div class="name">Admin User</div>
                    <div class="role">Super Admin</div>
                </div>
            </div>

        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <div>
                <h1>Manage Venues</h1>
                <p>View and manage all event venues</p>
            </div>
            <a th:href="@{/admin/addvenue}">
                <button class="add-btn">
                    <i class="fa-solid fa-plus"></i>
                    Add Venue
                </button>
            </a>
        </div>

        <!-- CARD -->
        <div class="card">

            <div class="card-header">
                <h2>All Venues</h2>
                <div class="search-inline">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <form id="searchForm"
                          th:action="@{/admin/listvenue}"
                          method="get">

                        <input type="text"
                               class="search-box-top"
                               placeholder="Search venues..."
                               id="searchInput"
                               name="keyword"
                               th:value="${keyword}"
                        >
                    </form>
                </div>
            </div>
            <!--Table-->
            <table>
                <thead>
                <tr>
                    <th>Venue</th>
                    <th>Location</th>
                    <th>Capacity</th>
                    <th>Events</th>
                    <th>Status</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
                </thead>

                <tbody id="venueTableBody">

                <!-- Empty state -->
                <tr class="empty-row"
                    th:if="${venues == null or #lists.isEmpty(venues)}">
                    <td colspan="6">
                        <i class="fa-solid fa-building"></i>
                        No venues found. Click "Add Venue" to create one.
                    </td>
                </tr>


                <tr th:each="venue : ${venues}">


                    <td>
                        <div class="venue-info">
                            <img th:if="${venue.imageUrl != null and !venue.imageUrl.isEmpty()}"
                                 th:src="${venue.imageUrl}"
                                 th:alt="${venue.venueName}"
                                 class="venue-thumb"/>
                            <div th:unless="${venue.imageUrl != null and !venue.imageUrl.isEmpty()}"
                                 class="venue-thumb-placeholder">
                                <i class="fa-solid fa-building"></i>
                            </div>
                            <strong th:text="${venue.venueName}"></strong>
                        </div>
                    </td>

                    <!-- Location -->
                    <td>
                        <div class="location">
                            <i class="fa-solid fa-location-dot"></i>
                            <div th:if="${venue.address != null}"
                                 th:text="${venue.address.ward.name + ', ' + venue.address.ward.city.name}">
                            </div>
                            <span th:unless="${venue.address != null}">N/A</span>
                        </div>
                        <div th:if="${venue.address != null and venue.address.specificAddress != null}"
                             style="font-size:12px; color:#9ca3af; margin-top:3px; padding-left:20px;"
                             th:text="${venue.address.specificAddress}">
                        </div>
                    </td>

                    <!-- Capacity -->
                    <td>
                        <div class="capacity">
                            <i class="fa-solid fa-users"></i>
                            <span th:text="${#numbers.formatInteger(venue.capacity, 1, 'COMMA')}">0</span>
                        </div>
                    </td>

                    <!-- Số event đã tổ chức -->
                    <td class="event-count"
                        th:text="${venue.events != null ? #lists.size(venue.events) + ' Events' : '0 Events'}">
                        0 Events
                    </td>

                    <!-- Status -->
                    <td><span class="status active">Active</span></td>

                    <!-- Actions -->
                    <td>
                        <div class="actions">
                            <a th:href="@{/admin/viewdetailvenue(id=${venue.venueId})}">
                                <button class="action-btn view-btn"

                                        title="View">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </a>
                            <a th:href="@{/admin/editvenue(id=${venue.venueId})}">
                                <button class="action-btn edit-btn"

                                        title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                            </a>
                        </div>
                    </td>

                </tr>

                </tbody>
            </table>

        </div>

    </div><!-- /main -->

</div><!-- /wrapper -->
<script>
    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("input", function () {

        const keyword = this.value;

        history.replaceState(
            null,
            "",
            "/admin/listvenue?keyword=" + encodeURIComponent(keyword)
        );

    });
</script>
</body>
</html>
