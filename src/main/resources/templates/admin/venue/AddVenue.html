<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Venue</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #fff0f5;
            color: #1e0e34;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid rgba(236, 72, 153, 0.3);
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-text {
            font-size: 13px;
            color: #84759b;
            letter-spacing: 1px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #4b3d60;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .menu a:hover,
        .menu a.active {
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            color: white;
        }

        /* ================= WRAPPER ================= */
        .wrapper {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ================= TOPBAR ================= */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 90;
            background: #ffffff;
            border-bottom: 1px solid rgba(236, 72, 153, 0.2);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 500px;
        }

        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 14px;
        }

        .search-box-top {
            width: 100%;
            background: #fff0f5;
            border: 1px solid rgba(236, 72, 153, 0.25);
            border-radius: 10px;
            padding: 10px 15px 10px 40px;
            color: #1e0e34;
            outline: none;
            font-size: 14px;
        }

        .search-box-top::placeholder {
            color: #84759b;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .notif-btn {
            position: relative;
            background: none;
            border: none;
            color: #ff1b8d;
            font-size: 20px;
            cursor: pointer;
        }

        .notif-btn .dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 9px;
            height: 9px;
            background: #ff1b8d;
            border-radius: 50%;
            border: 2px solid #ffffff;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .profile img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #ff1b8d;
            object-fit: cover;
        }

        .profile-info {
            line-height: 1.3;
        }

        .profile-info .name {
            font-size: 14px;
            font-weight: bold;
            color: #1e0e34;
        }

        /* ================= MAIN ================= */
        .main {
            flex: 1;
            padding: 25px;
        }

        /* ================= PAGE HEADER ================= */
        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 25px;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 12px;
            background: #fff0f5;
            color: #4b3d60;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        .back-btn:hover {
            background: rgba(255, 27, 141, 0.15);
            color: #ff1b8d;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: bold;
        }

        .page-header p {
            color: #9ca3af;
            margin-top: 5px;
            font-size: 14px;
        }

        /* ================= FORM CARD ================= */
        .form-container {
            background: #ffffff;
            border: 1px solid rgba(236, 72, 153, 0.25);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(255, 27, 141, 0.08);
            max-width: 850px;
        }

        .form-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #1e0e34;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
            color: #1e0e34;
        }

        .form-control {

            width: 100%;
            padding: 14px 16px;
            background: #fff0f5;
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 12px;
            color: #1e0e34;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #ff1b8d;
            box-shadow: 0 0 10px rgba(255, 27, 141, 0.15);
        }

        .form-control::placeholder {
            color: #84759b;
        }

        /* Style cho option trong select */
        .form-control option {
            background: #eca3c5;
            color: #0b1229;
        }

        textarea.form-control {
            resize: none;
            height: 150px;
        }

        /* ================= UPLOAD BOX ================= */
        .upload-box {
            border: 2px dashed rgba(236, 72, 153, 0.4);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: #ff1b8d;
            background: rgba(255, 27, 141, 0.04);
        }

        .upload-box i {
            font-size: 52px;
            color: #eca3c5;
            margin-bottom: 14px;
            display: block;
        }

        .upload-box p {
            margin-bottom: 6px;
            color: #d1d5db;
            font-size: 14px;
        }

        .upload-box span {
            color: #6b7280;
            font-size: 13px;
            font-weight: lighter;
        }



        /* ================= BUTTONS ================= */
        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        .btn {
            padding: 13px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }


        .btn-save {
            background: linear-gradient(to right, #ff1b8d, #ec4899);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(236, 72, 153, 0.35);
            color: #4b3d60;
        }

        .btn-cancel:hover {
            background: rgba(236, 72, 153, 0.08);
            color: #1e0e34;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 900px) {
            .sidebar {
                width: 220px;
            }

            .wrapper {
                margin-left: 220px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                display: none;
            }

            .wrapper {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <div class="logo-section">
        <div class="logo">EventHub</div>
        <div class="portal-text">Kênh Quản Trị</div>
    </div>

    <div class="menu">
        <a th:href="@{/admin/dashboard}"><i class="fa-solid fa-chart-line"></i> Bảng Điều Khiển</a>
        <a href="#" class="active"><i class="fa-solid fa-building"></i> Quản Lý Địa Điểm</a>
        <a th:href="@{/admin/listuser}"><i class="fa-solid fa-users"></i> Quản Lý Người Dùng</a>
        <a href="#"><i class="fa-solid fa-chart-pie"></i> Thống Kê</a>
        <a href="#"><i class="fa-solid fa-gear"></i> Cài Đặt </a>
    </div>

</div>

<!-- ================= WRAPPER ================= -->
<div class="wrapper">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-box-top" placeholder="Tìm kiếm địa điểm tổ chức, người dùng..."/>
        </div>

        <div class="topbar-right">
            <button class="notif-btn" aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="dot"></span>
            </button>
            <div class="profile">
                <img src="https://i.pravatar.cc/100?img=12" alt="Admin User"/>
                <div class="profile-info">
                    <div class="name">Quản Trị Viên</div>

                </div>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <a th:href="@{/admin/listvenue}">
                <button class="back-btn" aria-label="Back">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </a>
            <div>
                <h1>Thêm Địa Điểm Mới </h1>
                <p>Thêm địa điểm tổ chức sự kiện mới</p>
            </div>
        </div>

        <!-- FORM -->
        <div class="form-container">

            <h2 class="form-title">Thông Tin Địa Điểm</h2>

            <form method="post" enctype="multipart/form-data" th:action="@{/admin/addvenue}"
                  th:object="${CreateVenueDTO}">

                <!-- Upload -->
                <div class="form-group">
                    <label>Ảnh Địa Điểm:</label>

                    <input type="file"
                           id="venueFile"
                           name="venueFile"
                           accept="image/*"
                           style="display:none">

                    <div class="upload-box" onclick="document.getElementById('venueFile').click()">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p id="fileName">Nhấn để chọn ảnh</p>
                        <span>PNG, JPG </span>
                    </div>
                </div>

                <!-- Venue Name -->
                <div class="form-group">
                    <label>Tên Địa Điểm:</label>
                    <input type="text"
                           class="form-control"
                           placeholder="Nhập tên địa điểm"
                           th:field="*{venueName}"/>
                </div>

                <!-- City -->
                <div class="form-group">
                    <label>Tỉnh/ Thành Phố:</label>
                    <select id="citySelect"
                            class="form-control"
                            th:field="*{city}">

                        <option value="">-- Chọn Tỉnh/ Thành Phố --</option>

                        <option th:each="city : ${cities}"
                                th:value="${city.id}"
                                th:text="${city.name}">
                        </option>

                    </select>
                </div>

                <!-- Ward — load động bằng JS -->
                <div class="form-group">
                    <label>Xã/ Phường:</label>
                    <select id="wardSelect"
                            class="form-control"
                            th:field="*{ward}">
                        <option value="">-- Chọn Xã/ Phường --</option>
                    </select>

                </div>

                <!-- Street Address -->
                <div class="form-group">
                    <label>Địa chỉ chi tiết:</label>
                    <input type="text"
                           class="form-control"
                           placeholder="Nhập tên đường,..."
                           th:field="*{streetAddress}"/>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label>Mô Tả:</label>
                    <textarea class="form-control"
                              placeholder="Nhập mô tả về địa điểm, các tiện ích và đặc điểm nổi bật..."
                              th:field="*{description}"></textarea>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label>Trạng Thái:</label>
                    <select class="form-control" th:field="*{status}">
                        <option value="ACTIVE">Đang Hoạt Động</option>
                        <option value="INACTIVE">Ngừng Hoạt Động</option>
                        <option value="MAINTAIN">Bảo Trì</option>
                    </select>
                </div>
                <!-- ================= ZONES ================= -->
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
                        <label style="margin-bottom:0">Khu vực (Zone)</label>
                        <button type="button" class="btn btn-cancel"
                                onclick="addZone()"
                                style="padding:8px 16px; font-size:13px;">
                            <i class="fa-solid fa-plus"></i> Thêm Zone
                        </button>
                    </div>

                    <!-- Container chứa các zone -->
                    <div id="zone-container"></div>

                    <!-- Template zone ẩn — không submit vì disabled -->
                    <div id="zone-template" style="display:none">
                        <div class="zone-item" style="
                            background:#fff0f5;
                            border:1px solid rgba(236,72,153,0.3);
                            border-radius:14px;
                            padding:20px;
                            margin-bottom:14px;">

                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                                <span class="zone-title"
                                      style="font-weight:bold; color:#ff1b8d; font-size:14px;">Khu Vực 1</span>
                                <button type="button" onclick="removeZone(this)"
                                        style="background:none; border:none; color:#9ca3af; cursor:pointer; font-size:18px;">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>

                            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">
                                <div>
                                    <label style="font-size:13px; color:#1e0e34; display:block; margin-bottom:8px;">Tên
                                        Zone</label>
                                    <input type="text" class="form-control zone-name"
                                           placeholder="VD: Khu VIP, Khu Tiêu chuẩn (Standard)..."
                                           name="PLACEHOLDER_NAME"/>
                                </div>
                                <div>
                                    <label style="font-size:13px; color:#1e0e34; display:block; margin-bottom:8px;">Số
                                        hàng</label>
                                    <input type="number" class="form-control zone-rows"
                                           placeholder="VD: 8" min="1"
                                           name="PLACEHOLDER_ROWS"/>
                                </div>
                                <div>
                                    <label style="font-size:13px; color:#1e0e34; display:block; margin-bottom:8px;">Ghế
                                        / hàng</label>
                                    <input type="number" class="form-control zone-seats"
                                           placeholder="VD: 10" min="1"
                                           name="PLACEHOLDER_SEATS"/>
                                </div>
                            </div>

                            <div style="margin-top:12px; font-size:13px; color:#1e0e34;">
                                Tổng ghế: <span class="total-seats"
                                                style="color:#1e0e34; font-weight:bold;">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn btn-save">
                        Lưu Địa Điểm
                    </button>
                    <button type="button" class="btn btn-cancel" onclick="history.back()">
                        Hủy
                    </button>
                </div>

            </form>

        </div>

    </div><!-- /main -->

</div><!-- /wrapper -->

<script>
    // ============================================================
    // ZONE MANAGEMENT
    // ============================================================
    let zoneCount = 0;

    function addZone() {
        const template = document.getElementById('zone-template').firstElementChild;
        const clone = template.cloneNode(true);

        clone.querySelector('.zone-name').name = `zones[${zoneCount}].zoneName`;
        clone.querySelector('.zone-rows').name = `zones[${zoneCount}].rows`;
        clone.querySelector('.zone-seats').name = `zones[${zoneCount}].seatsPerRow`;
        clone.querySelector('.zone-title').textContent = `Zone ${zoneCount + 1}`;

        clone.querySelector('.zone-rows').addEventListener('input', () => updateTotal(clone));
        clone.querySelector('.zone-seats').addEventListener('input', () => updateTotal(clone));

        document.getElementById('zone-container').appendChild(clone);
        zoneCount++;
    }

    function removeZone(btn) {
        btn.closest('.zone-item').remove();
        reindex();
    }

    function reindex() {
        const items = document.querySelectorAll('#zone-container .zone-item');
        zoneCount = items.length;
        items.forEach((item, i) => {
            item.querySelector('.zone-name').name = `zones[${i}].zoneName`;
            item.querySelector('.zone-rows').name = `zones[${i}].rows`;
            item.querySelector('.zone-seats').name = `zones[${i}].seatsPerRow`;
            item.querySelector('.zone-title').textContent = `Zone ${i + 1}`;
        });
    }

    function updateTotal(zoneItem) {
        const rows = parseInt(zoneItem.querySelector('.zone-rows').value) || 0;
        const seats = parseInt(zoneItem.querySelector('.zone-seats').value) || 0;
        zoneItem.querySelector('.total-seats').textContent = rows * seats;
    }

    // Thêm zone đầu tiên mặc định khi load trang
    addZone();


    // ============================================================
    // LOAD WARD THEO CITY — gọi GET /admin/wards/{cityId}
    // ============================================================
    const citySelect = document.getElementById('citySelect');
    const wardSelect = document.getElementById('wardSelect');

    citySelect.addEventListener('change', function () {
        const cityId = this.value;

        // Reset ward select về trạng thái ban đầu
        wardSelect.innerHTML = '<option value="">-- Select Ward --</option>';

        // Nếu chưa chọn city thì dừng
        if (!cityId) return;


        fetch(`/admin/wards/${cityId}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Không thể tải danh sách ward. Status: ' + response.status);
                }
                return response.json();
            })
            .then(wards => {
                // Render từng ward vào select
                wards.forEach(ward => {
                    const option = document.createElement('option');
                    option.value = ward.id;      // Long ID → submit lên server
                    option.textContent = ward.name;
                    wardSelect.appendChild(option);
                });
            })
            .catch(err => {
                console.error('Lỗi load ward:', err);
                wardSelect.innerHTML =
                    '<option value="">-- Lỗi tải ward, thử lại --</option>';
            })

    });
</script>

</body>
</html>
