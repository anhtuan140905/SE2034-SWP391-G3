<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Portal – Settlement Details</title>

    <style>
        /* ═══ SIDEBAR ═══ */
        .sidebar {
            width: 270px;
            min-height: 100vh;
            background: #ffffff;
            border-right: 1px solid #E2E8F0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid #E2E8F0;
        }
        .sidebar-title {
            font-size: 2rem;
            font-weight: 800;
            color: #7C3AED;
            line-height: 1.15;
        }
        .sidebar-subtitle {
            margin-top: 6px;
            color: #64748B;
            font-size: .82rem;
        }
        .sidebar-nav {
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .nav-section-title {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #A78BFA;
            font-weight: 700;
            margin: 16px 10px 6px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 12px 14px;
            border-radius: 14px;
            text-decoration: none;
            color: #475569;
            font-size: .92rem;
            font-weight: 500;
            transition: .18s;
        }
        .nav-item svg {
            flex-shrink: 0;
            opacity: .75;
        }
        .nav-item:hover {
            background: #F5F3FF;
            color: #7C3AED;
        }
        .nav-item:hover svg { opacity: 1; }
        .nav-item.active {
            background: #EDE9FE;
            color: #7C3AED;
            font-weight: 700;
        }
        .nav-item.active svg { opacity: 1; }
        .sidebar-footer {
            border-top: 1px solid #E2E8F0;
            padding: 18px 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #7C3AED;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: .9rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .user-name { font-weight: 700; font-size: .92rem; }
        .user-role { color: #64748B; font-size: .78rem; margin-top: 2px; }


















        :root{
            --bg:#fbf5f7;
            --card:#FFFFFF;
            --border:#E2E8F0;

            --text:#0F172A;
            --muted:#64748B;

            --primary:#6C5CE7;
            --primary-2:#A66BFF;

            --sidebar:#FFFFFF;
        }

        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            height:100vh;
        }

        .app{display:flex;height:100vh;}


















        /* MAIN */
        .main{
            flex:1;
            padding:32px;
            overflow-y:auto;
        }

        .page-title{
            font-size:2rem;
            font-weight:800;
        }

        .page-desc{
            color:var(--muted);
            margin-top:6px;
        }

        /* BACK */
        .back-btn{
            display:inline-flex;
            align-items:center;
            gap:8px;
            margin-bottom:16px;
            text-decoration:none;
            color:var(--muted);
            font-weight:600;
        }

        .back-btn:hover{color:var(--primary);}

        /* BADGE */
        .badge{
            padding:6px 14px;
            border-radius:999px;
            font-size:.75rem;
            font-weight:700;
            display:inline-block;
        }

        .badge.pending{background:#FFF7ED;color:#F59E0B;}
        .badge.approved{background:#EFF6FF;color:#3B82F6;}
        .badge.completed{background:#ECFDF5;color:#22C55E;}

        /* HERO */
        .payout-hero{
            margin-top:20px;
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:24px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .ph-amount{
            font-size:2.2rem;
            font-weight:800;
            color:var(--primary);
        }

        /* BUTTON */
        .btn-approve{
            padding:12px 18px;
            border:none;
            border-radius:10px;
            background:linear-gradient(90deg,var(--primary),var(--primary-2));
            color:#fff;
            font-weight:600;
            cursor:pointer;
            display:flex;
            align-items:center;
            gap:8px;
        }

        .btn-approve:hover{opacity:.9;}

        /* GRID */
        .detail-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
            margin-top:24px;
        }

        .detail-section{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            overflow:hidden;
        }

        .detail-section-header{
            padding:16px 18px;
            border-bottom:1px solid var(--border);
            font-weight:700;
        }

        .detail-row{
            display:flex;
            justify-content:space-between;
            padding:12px 18px;
            border-bottom:1px solid #F1F5F9;
        }

        .dr-label{color:var(--muted);font-size:.85rem;}
        .dr-value{font-weight:600;}

    </style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-header">
            <div class="sidebar-title">Finance<br>Portal</div>
            <div class="sidebar-subtitle">Quản Lý Thanh Toán</div>
        </div>

        <nav class="sidebar-nav">

            <div class="nav-section-title">CHÍNH</div>
            <a class="nav-item" th:href="@{/finance/dashboard}">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                </svg>
                Tổng Quan
            </a>

            <div class="nav-section-title">TÀI CHÍNH</div>
            <a class="nav-item" th:href="@{/finance/events}">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <path d="M8 2v4M16 2v4M3 10h18"/>
                    <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01" stroke-linecap="round" stroke-width="2"/>
                </svg>
                Sự Kiện Đã Kết Thúc
            </a>
            <a class="nav-item" th:href="@{/finance/settlement/create}">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 8v8M8 12h8" stroke-linecap="round"/>
                </svg>
                Tạo Thanh Toán
            </a>
            <a class="nav-item active" th:href="@{/finance/settlements}">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <rect x="4" y="3" width="16" height="18" rx="2"/>
                    <path d="M8 8h8M8 12h8M8 16h5" stroke-linecap="round"/>
                </svg>
                Danh Sách Thanh Toán
            </a>

        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar">F</div>
                <div>
                    <div class="user-name"
                         th:text="${activeUser != null ? activeUser.firstName + ' ' + activeUser.lastName : 'Finance Officer'}">
                        Nhân Viên Tài Chính
                    </div>
                    <div class="user-role">Nhân Viên Tài Chính</div>
                </div>
            </div>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <a class="back-btn" th:href="@{/finance/settlements}">← Back</a>

        <h1 class="page-title"
            th:text="'Settlement #SET-' + ${settlement.settlementId}">
            Settlement
        </h1>

        <p class="page-desc"
           th:text="${settlement.event.title}">
        </p>

        <!-- STATUS -->
        <div style="margin-top:10px;">
            <span class="badge"
                  th:classappend="${settlement.status.name().toLowerCase()}"
                  th:text="${settlement.status}">
            </span>
        </div>

        <!-- HERO (UC-20: approve, mark paid, send email) -->
        <div class="payout-hero">

            <div>
                <div style="color:var(--muted);font-size:.9rem">Số Tiền Ròng</div>
                <div class="ph-amount"
                     th:text="${#numbers.formatDecimal(settlement.payoutAmount,1,'COMMA',0,'POINT') + 'đ'}">
                    0đ
                </div>
            </div>

            <div style="display:flex;gap:10px;flex-wrap:wrap;">

                <!-- Approve: only when PENDING -->
                <form th:if="${settlement.status.name() == 'PENDING'}"
                      th:action="@{/finance/settlement/{id}/approve(id=${settlement.settlementId})}"
                      method="post">
                    <button class="btn-approve" type="submit"
                            style="background:linear-gradient(90deg,#3B82F6,#60A5FA);">
                        ✔ Chấp thuận
                    </button>
                </form>

                <!-- Mark Paid: only when APPROVED -->
                <form th:if="${settlement.status.name() == 'APPROVED'}"
                      th:action="@{/finance/settlement/{id}/pay(id=${settlement.settlementId})}"
                      method="post">
                    <button class="btn-approve" type="submit"
                            style="background:linear-gradient(90deg,#22C55E,#4ADE80);">
                        💰 Đánh dấu đã thanh toán
                    </button>
                </form>

                <!-- Send Email: available when APPROVED or COMPLETED -->
                <form th:if="${settlement.status.name() == 'APPROVED' or settlement.status.name() == 'COMPLETED'}"
                      th:action="@{/finance/settlement/{id}/send-email(id=${settlement.settlementId})}"
                      method="post">
                    <button class="btn-approve" type="submit"
                            style="background:linear-gradient(90deg,#6C5CE7,#A66BFF);">
                        ✉ Gửi email tới người tổ chức
                    </button>
                </form>

            </div>

        </div>

        <!-- DETAILS -->
        <div class="detail-grid">

            <div class="detail-section">
                <div class="detail-section-header">Thông tin sự kiện</div>

                <div class="detail-row">
                    <span class="dr-label">Sự kiện</span>
                    <span class="dr-value" th:text="${settlement.event.title}"></span>
                </div>

                <div class="detail-row">
                    <span class="dr-label">Ban Tổ Chức</span>
                    <span class="dr-value"
                          th:text="${settlement.event.organizer.firstName + ' ' + settlement.event.organizer.lastName}">
                    </span>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-section-header">Tài chínhl</div>

                <div class="detail-row">
                    <span class="dr-label">Tổng</span>
                    <span class="dr-value" th:text="${settlement.grossRevenue}"></span>
                </div>

                <div class="detail-row">
                    <span class="dr-label">Phí</span>
                    <span class="dr-value" th:text="${settlement.platformFee}"></span>
                </div>

                <div class="detail-row">
                    <span class="dr-label">Số tiền thực nhận</span>
                    <span class="dr-value" th:text="${#numbers.formatDecimal(settlement.payoutAmount,1,'COMMA',0,'POINT') + 'đ'}">></span>
                </div>
            </div>

        </div>

    </main>
</div>

</body>
</html>
