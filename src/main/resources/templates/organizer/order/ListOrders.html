<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản lý Đơn hàng – EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>

    <!-- CSS của bạn -->
    <link rel="stylesheet" th:href="@{/organizer/css/Header.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/SideBar.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/ListOrder.css}">

    <!-- JS của bạn -->
    <script th:src="@{/organizer/js/Header.js}" defer></script>
    <script th:src="@{/organizer/js/sidebar.js}" defer></script>
</head>
<body>

<div class="app-wrapper">

    <!-- ════════ SIDEBAR — dùng đúng HTML bạn gửi ════════ -->
    <th:block th:replace="~{/organizer/Share/sidebar::sidebar}"></th:block>


    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

    <!-- ════════ MAIN ════════ -->
    <div class="main-content">

        <!-- HEADER — dùng đúng HTML bạn gửi -->
        <th:block th:replace="~{/organizer/Share/Header::header}"></th:block>

        <!-- ════════ PAGE BODY ════════ -->
        <main class="page-body">

            <!-- Heading -->
            <div class="mb-4">
                <h2 class="page-title mb-0">Quản lý Đơn hàng &amp; Vé</h2>
                <p class="page-sub">Tìm kiếm, lọc danh sách đơn hàng và quản lý giao dịch thanh toán.</p>
            </div>

            <!-- Filter form -->
            <form method="get"
                  class="d-flex flex-column flex-sm-row gap-3 align-items-stretch align-items-sm-center mb-4">

                <div class="search-box">
                    <span class="material-symbols-outlined icon-left">search</span>
                    <input type="text" name="keyword" th:value="${keyword}"
                           placeholder="Tìm mã đơn, tên khách"/>
                </div>

                <div class="filter-select-wrap">
                    <span class="material-symbols-outlined icon-left">filter_list</span>
                    <select name="status">
                        <option value="">Tất cả trạng thái</option>
                        <option value="PENDING_PAYMENT" th:selected="${status == 'PENDING_PAYMENT'}">PENDING_PAYMENT
                        </option>
                        <option value="PAID" th:selected="${status == 'PAID'}">PAID</option>
                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
                        <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">EXPIRED</option>
                    </select>
                    <span class="material-symbols-outlined icon-right">expand_more</span>
                </div>

                <button type="submit" class="btn-filter">
                    <span class="material-symbols-outlined" style="font-size:17px">search</span>
                    Tìm kiếm
                </button>
            </form>

            <!-- TABLE -->
            <div class="table-card mb-4">
                <div class="table-responsive">
                    <table class="table table-borderless align-middle">
                        <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã đơn hàng</th>
                            <th>Khách hàng</th>
                            <th>Sự kiện</th>
                            <th>Số lượng / Hạng vé</th>
                            <th>Tổng tiền</th>
                            <th>Ngày đặt</th>
                            <th>Trạng thái</th>
                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="order, stat : ${orders}">

                            <td th:text="${stat.count}"></td>

                            <td class="order-id"
                                th:text="${order.orderId}">
                            </td>

                            <td>
                            <span class="cust-name"
                                  th:text="${order.fullName}">
                            </span>

                                <span class="cust-phone"
                                      th:text="${order.phone}">
                                </span>
                            </td>

                            <td>
                                <span class="event-name"
                                      title="Summer Music Fest 2024" th:text="${order.eventTitle}">

                                </span>
                            </td>

                            <td style="color:#475569"
                                th:text="${order.quantityTicket}">
                            </td>

                            <td class="amount-val"
                                th:text="${#numbers.formatDecimal(order.totalAmount, 0,'COMMA', 0,'POINT') + ' ₫'}">
                            </td>
                            <td th:text="${order.createAt}"></td>
                            <td>
                            <span class="status-badge"
                                  th:text="${order.status}"
                                  th:classappend="${
                                      order.status == 'SUCCESS'
                                      ? 'badge-success'
                                      : 'badge-danger'
                                  }">
                            </span>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- PAGINATION -->
            <nav aria-label="Phân trang">
                <ul class="pagination justify-content-center" th:if="${totalPages > 1}">

                    <!-- Prev -->
                    <li class="page-item" th:if="${currentPage > 0}" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/organizer/event/{id}/orders(id=${eventId}, page=${currentPage - 1},keyword=${keyword}, status=${status})}">
                            «
                        </a>
                    </li>

                    <!-- Số trang -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/organizer/event/{id}/orders(id=${eventId}, page=${i},keyword=${keyword}, status=${status})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <!-- Next -->
                    <li class="page-item"
                        th:if="${currentPage < totalPages-1}"
                        th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/organizer/event/{id}/orders(id=${eventId}, page=${currentPage + 1},keyword=${keyword}, status=${status})}">
                            »
                        </a>
                    </li>

                </ul>
            </nav>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
