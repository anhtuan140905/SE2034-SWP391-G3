<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lỗi 403 - Không Có Quyền Truy Cập | EventHub</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
    />
    <link
            rel="stylesheet"
            th:href="@{/organizer/css/sidebar.css}"
            href="/organizer/css/SideBar.css"
    />
    <link
            rel="stylesheet"
            th:href="@{/organizer/css/Header.css}"
            href="/organizer/css/Header.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>
    <style>
        :root {
            --sidebar-w: 260px;
            --header-h: 64px;
            --clr-sidebar: #ffffff;
            --clr-bg: #faf4f4;
            --clr-border: rgba(0, 0, 0, .08);
            --clr-text: #0f172a;
            --clr-muted: #64748b;
            --clr-purple: #7c3aed;
            --clr-pink: #db2777;
            --gradient: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            --font-display: "Space Grotesk", sans-serif;
            --font-body: "Plus Jakarta Sans", sans-serif;
            --font-mono: "JetBrains Mono", monospace;
            --purple: #7c3aed;
            --purple-light: rgba(124, 58, 237, .08);
        }

        body {
            font-family: var(--font-body);
            background-color: var(--clr-bg);
            background-image:
                    radial-gradient(circle at 10% 15%, rgba(124, 58, 237, .03) 0%, transparent 35%),
                    radial-gradient(circle at 90% 75%, rgba(219, 39, 119, .03) 0%, transparent 35%),
                    linear-gradient(rgba(0, 0, 0, .012) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 0, 0, .012) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 48px 48px, 48px 48px;
            background-attachment: fixed;
            color: var(--clr-text);
            margin: 0;
            min-height: 100vh;
        }

        .main-wrapper {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 991.98px) {
            .main-wrapper {
                margin-left: 0;
            }
        }

        .error-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .error-container {
            max-width: 540px;
            width: 100%;
            background: #ffffff;
            padding: 56px 48px;
            border-radius: 24px;
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.02),
                0 8px 16px -6px rgba(0, 0, 0, 0.02),
                0 0 0 1px rgba(0, 0, 0, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            backdrop-filter: blur(8px);
        }

        h1 {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 120px;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            letter-spacing: -4px;
            font-family: 'Space Grotesk', sans-serif;
        }

        h2 {
            margin-top: 24px;
            color: #7c3aed;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            font-family: 'Space Grotesk', sans-serif;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-top: 14px;
            margin-bottom: 36px;
            font-size: 15px;
            font-weight: 500;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 36px;
            background: linear-gradient(135deg, #d946ef 0%, #c084fc 50%, #8b5cf6 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px -6px rgba(139, 92, 246, 0.3);
            border: none;
            cursor: pointer;
            letter-spacing: 0.2px;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -6px rgba(139, 92, 246, 0.45);
            filter: brightness(1.05);
            color: #ffffff;
        }
    </style>
</head>
<body>
<!-- ===== SIDEBAR OVERLAY ===== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<!-- ===== SIDEBAR  ===== -->
<th:block th:replace="~{/organizer/Share/sidebar::sidebar}"></th:block>

<!-- ===== MAIN WRAPPER ===== -->
<div class="main-wrapper">

    <!-- ===== HEADER  ===== -->
    <th:block th:replace="~{/organizer/Share/Header::header}"></th:block>

    <!-- ===== PAGE CONTENT ===== -->
    <main class="error-wrapper">
        <div class="error-container">
            <h1>403</h1>
            <h2>Truy cập bị từ chối</h2>
            <p>
                Bạn không có quyền truy cập vào trang này. Vui lòng kiểm tra lại đường
                dẫn hoặc đăng nhập vào tài khoản của bạn.
            </p>
            <a th:href="@{/organizer/event/{id}/dashboard(id=${eventId})}" class="btn-home">Quay lại Dashboard</a>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/organizer/js/sidebar.js}"></script>
<script th:src="@{/organizer/js/Header.js}"></script>
</body>
</html>
