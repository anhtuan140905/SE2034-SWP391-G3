<!-- HEADER -->
<header th:fragment="header"
        class="top-header d-flex align-items-center justify-content-between px-4"
>
    <div class="d-flex align-items-center gap-3 flex-grow-1">
        <button class="btn-icon d-lg-none" onclick="toggleSidebar(true)">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="search-wrap position-relative">
            <span class="material-symbols-outlined search-icon">search</span>
            <input
                    type="text"
                    class="search-input"
                    placeholder="Search events, tickets, orders..."
                    id="searchInput"
                    oninput="handleSearch(this.value)"
            />
            <button
                    class="search-clear d-none"
                    id="searchClear"
                    onclick="clearSearch()"
            >
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <img
                src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150&auto=format&fit=crop"
                alt="Avatar"
                class="user-avatar"
        />
        <div class="d-none d-md-block text-start">
            <div class="user-name">Minh Event Corp</div>
            <div class="user-role">Administrator</div>
        </div>
    </div>
</header>
