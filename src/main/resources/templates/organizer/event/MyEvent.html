<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Event Campaign Management — EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/organizer/css/SideBar.css}" href="/organizer/css/SideBar.css"/>
    <link rel="stylesheet" th:href="@{/organizer/css/Header.css}" href="/organizer/css/Header.css"/>
    <link rel="stylesheet" th:href="@{/organizer/css/ListEvent.css}"/>
</head>
<body>

<div class="layout-shell">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div
                class="sidebar-header d-flex align-items-center justify-content-between mb-4"
        >
            <div class="d-flex align-items-center gap-3">
                <div class="brand-icon">
            <span class="material-symbols-outlined text-white"
            >calendar_month</span
            >
                </div>
                <div>
                    <h1 class="brand-title mb-0">EventHub</h1>
                    <p class="brand-sub mb-0">Organizer Portal</p>
                </div>
            </div>
            <button class="btn-icon d-lg-none" onclick="toggleSidebar(false)">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <nav class="sidebar-nav flex-grow-1">
            <a th:href="@{/organizer/list/event}" class="nav-item "
            >
                <span class="material-symbols-outlined">dashboard</span>
                <span>My Event</span>
            </a>
        </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

    <div class="main-area">
        <!-- HEADER -->
        <th:block th:replace="~{/organizer/Share/Header::header}"></th:block>
        <main class="content-wrap">
            <div class="page-inner">
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span class="material-symbols-outlined align-middle me-1">error</span>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- ══════════════════════════════════════
                     HEADER
                ══════════════════════════════════════ -->
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                    <div>
                        <h2 class="page-title mb-0">Event Campaign Management</h2>
                        <p class="page-subtitle mb-0">List of all events and real-time ticket sales process.</p>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn-primary-solid" onclick="window.location.href='/organizer/create/event'">
                            <span class="material-symbols-outlined">add</span> Create New Event
                        </button>
                    </div>
                </div>

                <!-- ══════════════════════════════════════
                     FILTER FORM
                     Gộp search + filter vào 1 form GET.
                     Mỗi khi submit (search hoặc click tab)
                     → URL: ?status=APPROVED&status=ENDED&keyword=rock&page=1
                ══════════════════════════════════════ -->
                <form method="get"
                      th:action="@{/organizer/list/event}"
                      id="filterForm">

                    <!-- Reset page về 1 mỗi khi filter/search thay đổi -->
                    <input type="hidden" name="page" value="1" id="pageInput"/>

                    <!-- ── Search bar ───────────────────────────── -->
                    <div class="search-filter-row mb-3">
                        <div class="events-search">
                            <span class="material-symbols-outlined search-icon-sm">search</span>
                            <input type="text"
                                   name="keyword"
                                   th:value="${keyword}"
                                   placeholder="Search event name..."
                                   id="searchInput"
                                   autocomplete="off"/>
                        </div>

                        <!-- Badge hiển thị số filter đang chọn -->

                    </div>
                    <div class="filter-tabs mb-4">

                        <button type="button" class="filter-tab"
                                th:classappend="${selectedStatus == null} ? ' active' : ''"
                                onclick="selectStatus(null)">
                            All
                        </button>

                        <label class="filter-tab filter-tab-check"
                               th:classappend="${selectedStatus == 'PENDING'} ? ' active' : ''">
                            <input type="radio"
                                   name="status"
                                   value="PENDING"
                                   th:checked="${selectedStatus == 'PENDING'}"
                                   onclick="handleStatusClick(event, this)"/>
                            <span class="material-symbols-outlined tab-icon tab-icon-pending">hourglass_empty</span>
                            PENDING
                        </label>

                        <label class="filter-tab filter-tab-check"
                               th:classappend="${selectedStatus == 'ACTIVE'} ? ' active' : ''">
                            <input type="radio"
                                   name="status"
                                   value="ACTIVE"
                                   th:checked="${selectedStatus == 'ACTIVE'}"
                                   onclick="handleStatusClick(event, this)"/>
                            <span class="material-symbols-outlined tab-icon tab-icon-approved">check_circle</span>
                            ACTIVE
                        </label>

                        <label class="filter-tab filter-tab-check"
                               th:classappend="${selectedStatus == 'INACTIVE'} ? ' active' : ''">
                            <input type="radio"
                                   name="status"
                                   value="INACTIVE"
                                   th:checked="${selectedStatus == 'INACTIVE'}"
                                   onclick="handleStatusClick(event, this)"/>
                            <span class="material-symbols-outlined tab-icon tab-icon-pending">schedule</span>
                            INACTIVE
                        </label>

                        <label class="filter-tab filter-tab-check"
                               th:classappend="${selectedStatus == 'ENDED'} ? ' active' : ''">
                            <input type="radio"
                                   name="status"
                                   value="ENDED"
                                   th:checked="${selectedStatus == 'ENDED'}"
                                   onclick="handleStatusClick(event, this)"/>
                            <span class="material-symbols-outlined tab-icon tab-icon-ended">event_busy</span>
                            ENDED
                        </label>

                    </div>
                </form>
                <!-- /filterForm -->

                <!-- ══════════════════════════════════════
                     EVENTS List
                ══════════════════════════════════════ -->
                <div class="events-list">
                    <div th:if="${#lists.isEmpty(eventCards)}" class="no-result-msg">
                        <span class="material-symbols-outlined">search_off</span>
                        <p>Không tìm thấy event nào.</p>
                    </div>

                    <div class="event-card" th:each="ec : ${eventCards}">
                        <!-- Top: banner + info -->
                        <div class="event-card-main">
                            <div class="event-banner">
                                <img th:src="${ec.thumnail}" th:alt="${ec.eventName}" />
                                <span class="status-badge"
                                      th:classappend="'status-' + ${#strings.toLowerCase(ec.statusEvent)}"
                                      th:text="${ec.statusEvent}"></span>
                            </div>
                            <div class="event-body">
                                <span class="event-category" th:text="${ec.eventCatagory}"></span>
                                <h3 class="event-name" th:text="${ec.eventName}"></h3>
                                <div class="event-meta-row">
                                    <span class="material-symbols-outlined">calendar_today</span>
                                    <span th:text="${ec.date}"></span>
                                </div>
                                <div class="event-meta-row">
                                    <span class="material-symbols-outlined">location_on</span>
                                    <span th:text="${ec.venueName}"></span>
                                </div>
                                <div class="occupancy-block mt-2">
                                    <div class="occupancy-label">
                                        <span>Occupancy: <strong th:text="${ec.ticketSelled}"></strong> / <span th:text="${ec.stock}"></span> tix</span>
                                        <strong th:text="${ec.Percent + '%'}"></strong>
                                    </div>
                                    <div class="progress-track">
                                        <div class="progress-fill" th:style="'width:' + ${ec.Percent} + '%'"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Bottom: action nav bar -->
                        <div class="event-nav-bar">
                            <button class="nav-btn" th:onclick="|window.location.href='/organizer/dashboard'|">
                                <span class="material-symbols-outlined">pie_chart</span>
                                Tổng quan
                            </button>
                            <button class="nav-btn" th:onclick="|window.location.href='/organizer/event/${ec.id}/members'|">
                                <span class="material-symbols-outlined">person</span>
                                Thành viên
                            </button>
                            <button class="nav-btn" th:onclick="|window.location.href='/organizer/event/${ec.id}'|">
                                <span class="material-symbols-outlined">description</span>
                                Thông Tin
                            </button>
                            <button class="nav-btn" th:onclick="|window.location.href='/organizer/event/${ec.id}/edit'|">
                                <span class="material-symbols-outlined">edit</span>
                                Chỉnh sửa
                            </button>
                            <button class="nav-btn" th:onclick="|window.location.href='/organizer/event/${ec.id}/publish'|">
                                <span class="material-symbols-outlined">campaign</span>
                                Đăng sự kiện
                            </button>
                        </div>
                    </div>

                </div>
                <!-- ══════════════════════════════════════
                     PAGINATION
                     Giữ nguyên status[] và keyword trong URL
                ══════════════════════════════════════ -->
                <div class="pagination-wrapper" th:if="${totalItems > 0}">

                    <div class="pagination-info">
                        Showing <strong th:text="${fromIndex}"></strong>–<strong th:text="${toIndex}"></strong>
                        of <strong th:text="${totalItems}"></strong> events
                    </div>

                    <nav class="pagination-nav" aria-label="Event pagination">

                        <!-- Nút Prev -->
                        <!--
                          Thymeleaf không build được URL với List param trực tiếp trong th:href,
                          nên dùng JS để submit form với page thay đổi.
                        -->
                        <button type="button" class="page-btn page-nav"
                                th:disabled="${currentPage == 1}"
                                th:classappend="${currentPage == 1} ? ' disabled'"
                                th:onclick="|goToPage(${currentPage - 1})|"
                                aria-label="Previous page">
                            <span class="material-symbols-outlined">chevron_left</span>
                        </button>

                        <!-- Số trang -->
                        <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">

                            <th:block th:if="${totalPages <= 7
                                 or i == 1
                                 or i == totalPages
                                 or (i >= currentPage - 1 and i <= currentPage + 1)}">
                                <button type="button" class="page-btn"
                                        th:text="${i}"
                                        th:classappend="${i == currentPage} ? ' active'"
                                        th:onclick="|goToPage(${i})|">
                                </button>
                            </th:block>

                            <span th:if="${totalPages > 7 and i == 2 and currentPage > 3}"
                                  class="page-dots">···</span>
                            <span th:if="${totalPages > 7 and i == totalPages - 1 and currentPage < totalPages - 2}"
                                  class="page-dots">···</span>

                        </th:block>

                        <!-- Nút Next -->
                        <button type="button" class="page-btn page-nav"
                                th:disabled="${currentPage == totalPages}"
                                th:classappend="${currentPage == totalPages} ? ' disabled'"
                                th:onclick="|goToPage(${currentPage + 1})|"
                                aria-label="Next page">
                            <span class="material-symbols-outlined">chevron_right</span>
                        </button>

                    </nav>
                </div>

            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/organizer/js/sidebar.js}" src="/organizer/js/sidebar.js"></script>
<script th:src="@{/organizer/js/Header.js}" src="/organizer/js/Header.js"></script>
<script>
    function submitFilter() {
        document.getElementById("pageInput").value = "1";
        document.getElementById("filterForm").submit();
    }

    // Nút "All": bỏ chọn radio rồi submit
    function selectStatus(value) {
        if (value === null) {
            document.querySelectorAll('#filterForm input[name="status"]')
                .forEach(r => r.checked = false);
        }
        submitFilter();
    }

    function handleStatusClick(event, radio) {
        event.stopPropagation();
        submitFilter();
    }

    function goToPage(page) {
        document.getElementById("pageInput").value = page;
        document.getElementById("filterForm").submit();
    }
</script>
</body>
</html>
