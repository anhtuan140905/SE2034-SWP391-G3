<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ nhà tổ chức</title>
    <link rel="stylesheet" th:href="@{/organizer/css/OrganizerAccountView.css}">

    <!-- Bootstrap 5 -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <!-- Google Fonts giống MyEvent -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
            rel="stylesheet"
    />

    <!-- CSS gộp chung Sidebar, Header và Form của trang Profile -->
    <link rel="stylesheet" th:href="@{/organizer/css/OrganizerAccountView.css}" />

</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
    <div
            class="sidebar-header d-flex align-items-center justify-content-between mb-4"
    >
        <div class="d-flex align-items-center gap-3">
            <div class="brand-icon">
            <span class="material-symbols-outlined text-white"
            >calendar_month</span
            >
            </div>
            <div>
                <h1 class="brand-title mb-0">EventHub</h1>
                <p class="brand-sub mb-0">Organizer Portal</p>
            </div>
        </div>
        <button class="btn-icon d-lg-none" onclick="toggleSidebar(false)">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <nav class="sidebar-nav flex-grow-1">
        <a th:href="@{/organizer/list/event}" class="nav-item">
            <span class="material-symbols-outlined">dashboard</span>
            <span>My Event</span>
        </a>
    </nav>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<div class="main-wrapper">
    <!-- ===== HEADER ===== -->
    <th:block th:replace="~{/organizer/Share/Header::header}"></th:block>

    <div class="page-content-wrapper">
        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <div class="icon-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                    </div>
                    <div>
                        <h1>Hồ sơ nhà tổ chức</h1>
                        <p>Quản lý hồ sơ nhà tổ chức và thông tin quyết toán tài khoản.</p>
                    </div>
                </div>
            </div>

            <form id="profileForm" class="form-body" method="post" th:action="@{/organizer/profile}" th:object="${organizerProfile}">
                <div class="form-col">
                    <p class="section-title">Thông tin doanh nghiệp</p>

                    <div class="field">
                        <label>Mã số thuế<span class="required">*</span></label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v18M18 3v18M4 8h16M4 16h16"/></svg>
                            <input type="text" th:field="*{taxCode}" placeholder="Nhập mã số thuế">
                        </div>
                    </div>

                    <div class="field">
                        <label>Tên pháp lý<span class="required">*</span></label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>
                            <input type="text" th:field="*{legalName}" placeholder="Nhập tên pháp lý">
                        </div>
                    </div>

                    <div class="field">
                        <label>Tên công ty (Company Name)</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18"/><path d="M9 9h1M14 9h1M9 13h1M14 13h1M9 17h1M14 17h1"/></svg>
                            <input type="text" th:field="*{companyName}" placeholder="Nhập tên công ty">
                        </div>
                    </div>

                    <div class="field">
                        <label>Loại hình doanh nghiệp (Business Type)</label>
                        <div class="input-wrap select-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="19" r="2"/><path d="M12 7v6M12 13l-6 4M12 13l6 4"/></svg>
                            <select th:field="*{businessType}">
                                <option value="cong_ty_tnhh">Công ty TNHH</option>
                                <option value="cong_ty_co_phan">Công ty Cổ phần</option>
                                <option value="ho_kinh_doanh">Hộ kinh doanh</option>
                                <option value="ca_nhan">Cá nhân</option>
                                <option value="to_chuc_phi_loi_nhuan">Tổ chức phi lợi nhuận</option>
                            </select>
                            <span class="chevrons">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                  </span>
                        </div>
                    </div>

                    <div class="field">
                        <label>Địa chỉ pháp lý (Legal Address)<span class="required">*</span></label>
                        <div class="input-wrap textarea-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-top:3px"><path d="M12 21s7-6.5 7-11a7 7 0 10-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
                            <textarea rows="2" th:field="*{legalAddress}" placeholder="Nhập địa chỉ pháp lý"></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-col">
                    <p class="section-title">Thông tin tài khoản quyết toán</p>

                    <div class="field">
                        <label>Bank Account Name (Tên chủ tài khoản)<span class="required">*</span></label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                            <input type="text" th:field="*{bankAccountName}" placeholder="Nhập tên chủ tài khoản">
                        </div>
                    </div>

                    <div class="field">
                        <label>Bank Account Number (Số tài khoản)<span class="required">*</span></label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                            <input type="text" th:field="*{bankAccountNumber}" placeholder="Nhập số tài khoản">
                        </div>
                    </div>

                    <div class="field">
                        <label>Bank Name (Tên ngân hàng)<span class="required">*</span></label>
                        <div class="input-wrap select-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-6 9 6"/><path d="M4 10v10M20 10v10M9 10v10M15 10v10"/><path d="M2 20h20"/></svg>
                            <select th:field="*{bankId}">
                                <option value="" disabled selected>Chọn ngân hàng</option>
                                <option
                                        th:each="bank : ${banks}"
                                        th:value="${bank.bankId}"
                                        th:text="${bank.bankName}">
                                </option>
                            </select>
                            <span class="chevrons">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                  </span>
                        </div>
                    </div>

                    <div class="field">
                        <label>Bank Branch (Chi nhánh ngân hàng)</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20V10M15 20V10M4 20h16M4 10l8-6 8 6M4 10v10M20 10v10"/></svg>
                            <input type="text" th:field="*{bankBranch}" placeholder="Nhập chi nhánh ngân hàng">
                        </div>
                    </div>
                </div>
            </form>

            <div class="card-footer">
                <button type="button" onclick="window.location.href='/organizer/list/event'" class="btn btn-cancel">Cancel</button>
                <button type="submit" form="profileForm" class="btn btn-save">Save Profile</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/organizer/js/sidebar.js}"></script>
<script th:src="@{/organizer/js/Header.js}"></script>
</body>
</html>
