<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi tiết Voucher – EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/organizer/css/Header.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/SideBar.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/ViewEvent.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/voucher.css}">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<th:block th:replace="~{/organizer/Share/sidebar::sidebar}"></th:block>

<div class="main-wrapper">

    <th:block th:replace="~{/organizer/Share/Header::header}"></th:block>

    <main>
        <div style="max-width:1280px; margin:0 auto;" th:object="${voucher}">

            <div class="mb-3">
                <a th:href="@{/organizer/event/{id}/voucher(id=${eventId})}" class="breadcrumb-back">
                    <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>
                    <span>Quay lại Quản lý Voucher</span>
                </a>
            </div>

            <div class="glass-card mb-4">

                <div class="p-4 pb-0">
                    <h2 class="voucher-title mt-2" th:text="${voucher.title}">Summer Sale Voucher</h2>
                    <div class="voucher-code">
                        <span th:text="'Voucher code: ' + ${voucher.code}">Trống</span>
                    </div>
                </div>

                <div class="p-4">
                    <div class="row g-4">
                        <div class="col-lg-12">

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="info-box purple h-100">
                                        <div class="info-box-title">
                                            Quy tắc Voucher
                                        </div>
                                        <div class="info-row">
                                            <span class="lbl">Loại giảm giá:</span>
                                            <span class="val" th:text="${voucher.discountType}">PERCENTAGE</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="lbl">Giá trị giảm:</span>
                                            <span class="val"
                                                  th:if="${voucher.discountType.name() == 'PERCENT'}"
                                                  th:text="${voucher.discountValue + '%'}">10%</span>
                                            <span class="val"
                                                  th:if="${voucher.discountType.name() != 'PERCENT'}"
                                                  th:text="${#numbers.formatDecimal(voucher.discountValue,0,'COMMA',0,'POINT') + ' ₫'}">100.000 ₫</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="lbl">Giới hạn sử dụng:</span>
                                            <span class="val" th:text="${voucher.maxUsage}">100</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="info-box pink h-100">
                                        <div class="info-box-title">
                                            <span class="material-symbols-outlined"
                                                  style="font-size:18px">schedule</span>
                                            Hiệu lực
                                        </div>
                                        <div class="info-row">
                                            <span class="lbl">Từ ngày:</span>
                                            <span class="val"
                                                  th:text="${#temporals.format(voucher.validFrom,'dd/MM/yyyy HH:mm')}">01/07/2026</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="lbl">Đến ngày:</span>
                                            <span class="val"
                                                  th:text="${#temporals.format(voucher.validTo,'dd/MM/yyyy HH:mm')}">10/07/2026</span>
                                        </div>
                                        <div class="info-row">
                                            <span class="lbl">Trạng thái:</span>
                                            <span class="val" th:text="${voucher.isActive ? 'Active' : 'Inactive'}">Active</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="section-title">
                                    <span class="material-symbols-outlined" style="color:#7c3aed;font-size:18px">description</span>
                                    Mô tả
                                </div>
                                <div class="desc-box"
                                     th:text="${voucher.description != null and !#strings.isEmpty(voucher.description) ? voucher.description : 'Chưa có mô tả cho voucher này.'}">
                                </div>
                            </div>

                            <div>
                                <div class="section-title">
                                    <span class="material-symbols-outlined" style="color:#7c3aed;font-size:18px">edit_square</span>
                                    Chỉnh sửa Voucher
                                </div>

                                <div class="voucher-edit-placeholder">
                                    <form th:action="@{/organizer/event/{id}/voucher/{voucherId}/status(id=${eventId}, voucherId=${voucher.voucherId})}"
                                          method="post">
                                        <label class="voucher-label">Trạng thái</label>
                                        <select class="form-select voucher-input" name="isActive"
                                                style="max-width:220px;">
                                            <option th:value="true" th:selected="${voucher.isActive}">Active</option>
                                            <option th:value="false" th:selected="${!voucher.isActive}">Inactive
                                            </option>
                                        </select>
                                        <button type="submit" class="btn-primary-solid mt-3">
                                            <span>Cập nhật Trạng thái</span>
                                        </button>
                                    </form>

                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/organizer/js/sidebar.js}"></script>
<script th:src="@{/organizer/js/Header.js}"></script>

</body>
</html>
