<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản lý Voucher – EventHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/organizer/css/Header.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/SideBar.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/ViewEvent.css}">
    <link rel="stylesheet" th:href="@{/organizer/css/voucher.css}">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<th:block th:replace="~{/organizer/Share/sidebar::sidebar}"></th:block>

<div class="main-wrapper">

    <th:block th:replace="~{/organizer/Share/Header::header}"></th:block>

    <main>
        <div style="max-width:1280px; margin:0 auto;">

            <div class="mb-3">
                <a th:href="@{/organizer/event/detail/{id}(id=${eventId})}" class="breadcrumb-back">
                    <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>
                    <span>Quay lại Chi tiết Sự kiện</span>
                </a>
            </div>

            <div class="glass-card mb-4 p-4">
                <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-4">
                    <span class="material-symbols-outlined">check_circle</span>
                    <span th:text="${successMessage}"></span>
                </div>

                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                    <div>
                        <div class="section-title mb-1">
                            <span class="material-symbols-outlined" style="color:#7c3aed;font-size:18px">local_offer</span>
                            Quản lý Voucher
                        </div>
                        <p style="font-size:13px;color:#64748b;margin:0;">
                            Danh sách toàn bộ mã giảm giá đang áp dụng cho sự kiện này.
                        </p>
                    </div>

                    <a th:href="@{/organizer/event/{id}/voucher/create(id=${eventId})}" class="btn-primary-solid">
                        <span class="material-symbols-outlined">add_circle</span>
                        <span>Tạo Voucher</span>
                    </a>
                </div>

                <div class="voucher-table-wrapper">
                    <table class="voucher-table">
                        <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã</th>
                            <th>Tiêu đề</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(vouchers)}">
                            <td colspan="5" class="voucher-empty-row">
                                Chưa có voucher nào được tạo cho sự kiện này.
                            </td>
                        </tr>

                        <tr th:each="voucher, iterStat : ${vouchers}">
                            <td th:text="${iterStat.index + 1}">1</td>
                            <td class="voucher-mono" th:text="${voucher.code}">SALE10</td>
                            <td th:text="${voucher.title}">Summer Sale</td>
                            <td>
                                <span th:if="${voucher.isActive}" class="voucher-status-badge status-active">Active</span>
                                <span th:unless="${voucher.isActive}" class="voucher-status-badge status-inactive">Inactive</span>
                            </td>
                            <td>
                                <a th:href="@{/organizer/event/{id}/voucher/{voucherId}(id=${eventId}, voucherId=${voucher.voucherId})}"
                                   class="btn-view-voucher">
                                    Chi tiết
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/organizer/js/sidebar.js}"></script>
<script th:src="@{/organizer/js/Header.js}"></script>

</body>
</html>
