<!-- ===== SIDEBAR ===== -->
<aside th:fragment="sidebar" class="sidebar" id="sidebar">
  <div
          class="sidebar-header d-flex align-items-center justify-content-between mb-4"
  >
    <div class="d-flex align-items-center gap-3">
      <div class="brand-icon">
            <span class="material-symbols-outlined text-white"
            >calendar_month</span
            >
      </div>
      <div>
        <h1 class="brand-title mb-0">EventHub</h1>
        <p class="brand-sub mb-0">Organizer Portal</p>
      </div>
    </div>
    <button class="btn-icon d-lg-none" onclick="toggleSidebar(false)">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <nav class="sidebar-nav flex-grow-1">
    <a th:href="@{/organizer/dashboard}" class="nav-item "
    th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
      <span class="material-symbols-outlined">dashboard</span>
      <span>Dashboard</span>
    </a>
    
    <a
            th:href="@{/organizer/profile}"
            class="nav-item "
            th:classappend="${activeMenu == 'profile'} ? ' active' : ''">
      <span class="material-symbols-outlined">account_circle</span>
      <span>Organizer Account</span>
    </a>
    <a href="#" class="nav-item" onclick="setTab(event, 'events')">
      <span class="material-symbols-outlined">calendar_today</span>
      <span>Event Management</span>
    </a>
    <a href="#" class="nav-item" onclick="setTab(event, 'tickets')">
      <span class="material-symbols-outlined">confirmation_number</span>
      <span>Ticket Configuration</span>
    </a>
    <a href="#" class="nav-item" onclick="setTab(event, 'vouchers')">
      <span class="material-symbols-outlined">local_offer</span>
      <span>Discount Vouchers</span>
    </a>
    <a href="#" class="nav-item" onclick="setTab(event, 'orders')">
      <span class="material-symbols-outlined">shopping_basket</span>
      <span>Orders & Tickets</span>
    </a>
    <a href="#" class="nav-item" onclick="setTab(event, 'staff')">
      <span class="material-symbols-outlined">groups</span>
      <span>Staff Permissions</span>
    </a>
  </nav>

  <div class="sidebar-footer mt-auto pt-3">
    <button class="btn-create w-100 mb-2" onclick="window.location.href='/organizer/create/event'">
      <span class="material-symbols-outlined">add</span>
      Create New Event
    </button>
    <a th:href="@{/auth/login}" class="nav-item nav-logout" onclick="handleLogout(event)">
      <span class="material-symbols-outlined">logout</span>
      <span>Sign Out</span>
    </a>
  </div>
</aside>
