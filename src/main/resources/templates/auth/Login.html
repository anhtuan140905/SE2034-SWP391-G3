<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EventHub — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/auth/css/Login.css}" />
</head>
<body>

<!-- Background -->
<div class="bg-layer">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-grid"></div>
</div>

<div class="lp-root">

    <!-- bên left -->
    <div class="lp-left">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="lp-brand">
            <span class="lp-logo-name">EventHub</span>
        </div>

        <div class="lp-hero">
            <h2>Khám phá <em>sự kiện tuyệt vời</em><br/>xung quanh bạn</h2>
        </div>
    </div>

    <div class="lp-right">
        <div class="form-inner">

            <div class="panel-login" id="pLogin">
                <div class="form-head">
                    <h1>Đăng nhập</h1>
                </div>


                <div class="social-row">
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-social mb-2">
                        <span class="g-pill">
                          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        </span>
                        Google
                    </a>
                </div>


                <form th:action="@{/auth/login}" method="post">
                    <div th:if="${error}" class="alert-error" >
                        <span th:text="${error}"></span>
                    </div>
                    <div th:if="${success}" class="alert-success">
                        <span th:text="${success}"></span>
                    </div>
                    <div class="field">
                        <input type="email" id="email" name="username"
                               placeholder=" " autocomplete="email"/>
                        <label for="email">Tên đăng nhập</label>
                    </div>

                    <div class="field field-pw">
                        <input type="password" id="pw" name="password"
                               placeholder=" " autocomplete="current-password"/>
                        <label for="pw">Mật khẩu</label>
                    </div>

                    <button class="btn-primary" type="submit">
                        Sign In
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  stroke-width="2.5"
                                  d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                        </svg>
                    </button>

                    <div class="field-remember">
                        <label class="check-wrap">
                            <input type="checkbox" name="remember-me"/>
                            Remember me
                        </label>
                        <button type="button" class="text-btn" id="forgotBtn" th:onclick="|location.href='@{/auth/forgot-password}'|">Quên mật khẩu</button>                    </div>
                </form>

                <p class="reg-link">Chưa có tài khoản? <a th:href = "@{/auth/register}">Tạo tài khoản</a></p>
            </div>

            <div class="panel-forgot" id="pForgot">
                <div class="form-head">
                    <h1>Reset password 🔑</h1>
                    <p>Nhập email để nhận mã OTP</p>
                </div>
                <div class="field">
                    <input type="email" id="fEmail" placeholder=" " autocomplete="email"/>
                    <label for="fEmail">Email Address</label>
                </div>
                <button class="btn-primary" type="button">
                    Send OTP Code
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </button>
                <p class="reg-link" style="margin-top:1.125rem;">
                    <a th:href = "@{/auth/login}" id="backBtn" style="color:#9b8bb0;font-weight:500;">← Back to sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/auth/js/Login.js}"></script>
</body>
</html>
