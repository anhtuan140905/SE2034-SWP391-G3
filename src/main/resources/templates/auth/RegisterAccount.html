<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EventHub — Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/auth/css/RegisterAccount.css}" />
</head>
<body>

<div class="bg-layer">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-grid"></div>
</div>

<div class="lp-root">
    <!-- bên left -->
    <div class="lp-left">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="lp-brand">
            <span class="lp-logo-name">EventHub</span>
        </div>

        <div class="lp-hero">
            <h2>Khám phá <em>sự kiện tuyệt vời</em><br/>xung quanh bạn</h2>
        </div>
    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="lp-right">
        <div class="form-inner">

            <!-- ════ REGISTER PANEL ════ -->
            <div class="panel active" id="panelRegister">
                <div class="form-head">
                    <h1>Tạo tài khoản </h1>
                </div>

                <!-- ── USER FORM ── -->
                <form id="formUserRaw" method="post" th:action="@{/auth/register/user}" th:object="${registerUserDTO}">
                    <div id="formUser">
                        <div class="field-grid">
                            <div class="field">
                                <span class="error-msg" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
                                <input type="text" id="u_firstName" placeholder=" " autocomplete="name" th:field="*{firstName}"/>
                                <label for="u_firstName">Họ</label>
                            </div>
                            <div class="field">
                                <span class="error-msg" th:if="${#fields.hasErrors('middleName')}" th:errors="*{middleName}"></span>
                                <input type="text" id="u_middlename" placeholder=" " autocomplete="name" th:field="*{middleName}"/>
                                <label for="u_middlename">Tên đệm</label>
                            </div>
                            <div class="field">
                                <span class="error-msg" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
                                <input type="text" id="u_lastname" placeholder=" " autocomplete="name" th:field="*{lastName}"/>
                                <label for="u_lastname">Tên</label>
                            </div>
                            <div class="field">
                                <span class="error-msg" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                                <input type="tel" id="u_phone" placeholder=" " autocomplete="tel" th:field="*{phone}"/>
                                <label for="u_phone">Số điện thoại</label>
                            </div>
                        </div>

                        <div class="field">
                            <span class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                            <input type="email" id="u_email" placeholder=" " autocomplete="email" th:field="*{username}"/>
                            <label for="u_email">Địa chỉ email</label>
                        </div>

                        <div class="field-grid">
                            <div class="field field-select" id="genderField">
                                <select id="u_gender" onchange="handleSelect(this,'genderField')" th:field="*{gender}">
                                    <option value="" selected></option>
                                    <option value="MALE">Nam</option>
                                    <option value="FEMALE">Nữ</option>
                                    <option value="OTHER">Khác</option>
                                </select>
                                <label for="u_gender">Giới tính</label>
                            </div>
                            <div class="field">
                                <span th:if="${#fields.hasErrors('*{dob}')}" th:errors="*{dob}"></span>
                                <input type="date" id="u_dob" placeholder=" " onchange="this.setAttribute('placeholder',' ')" th:field="*{dob}"/>
                                <label for="u_dob">Ngày sinh</label>
                            </div>
                        </div>

                        <div class="field field-pw">
                            <span class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                            <input type="password" id="u_pw" placeholder=" " autocomplete="new-password" oninput="checkStrength(this.value,'pwStrength','strengthLabel')" th:field="*{password}"/>
                            <label for="u_pw">Mật khẩu</label>
                            <button class="eye-btn" type="button" onclick="toggleEye('u_pw',this)" aria-label="Toggle password">
                                <svg class="eye-show" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                <svg class="eye-hide" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                            </button>
                        </div>
                        <div class="pw-strength strength-0" id="pwStrength">
                            <div class="strength-bars">
                                <div class="strength-bar"></div><div class="strength-bar"></div>
                                <div class="strength-bar"></div><div class="strength-bar"></div>
                            </div>
                        </div>

                        <div class="field field-pw">
                            <span class="error-msg" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                            <input type="password" id="u_cpw" placeholder=" " autocomplete="new-password" th:field="*{confirmPassword}"/>
                            <label for="u_cpw">Xác nhận mật khẩu</label>
                            <button class="eye-btn" type="button" onclick="toggleEye('u_cpw',this)" aria-label="Toggle confirm password">
                                <svg class="eye-show" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                <svg class="eye-hide" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                            </button>
                        </div>

                        <button class="btn-primary" type="submit" style="margin-top:.625rem;">
                            Tạo tài khoản
                        </button>
                    </div>
                </form>

                <p class="reg-link">Bạn đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/auth/js/RegisterAccount.js}"></script>
</body>
</html>
