<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<header th:fragment="header" class="mod-header">

    <!-- Page title breadcrumb -->
    <div class="header-breadcrumb">
        <span th:text="${pageTitle != null ? pageTitle : 'EVENTHUB CONTROL CENTER'}">EVENTHUB CONTROL CENTER</span>
    </div>

    <!-- Right side actions -->
    <div class="header-actions">

        <!-- Greeting -->
        <span class="header-greeting">
            HELLO, <strong th:text="${#authentication != null ? #authentication.name : 'ALICE'}">ALICE</strong>
        </span>

    </div>

</header>

</body>
</html>
