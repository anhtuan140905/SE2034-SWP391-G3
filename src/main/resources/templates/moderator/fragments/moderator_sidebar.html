<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<aside th:fragment="sidebar" class="mod-sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
        <div class="brand-text">
            <span class="brand-name">EVENTHUB</span>
            <span class="brand-role">CỔNG KIỂM DUYỆT</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <ul>
            <li th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <a th:href="@{/moderator/dashboard}">
                    <span class="nav-icon"><i class="fa-solid fa-table-cells-large"></i></span>
                    <span class="nav-label">Bảng điều khiển</span>
                </a>
            </li>
            <li th:classappend="${activePage == 'events'} ? 'active' : ''">
                <a th:href="@{/moderator/events}">
                    <span class="nav-icon"><i class="fa-regular fa-calendar-days"></i></span>
                    <span class="nav-label">Sự kiện đang chờ xử lý</span>
                </a>
            </li>
            <li th:classappend="${activePage == 'organizers'} ? 'active' : ''">
                <a th:href="@{/moderator/organizers}">
                    <span class="nav-icon"><i class="fa-solid fa-user-tie"></i></span>
                    <span class="nav-label">Quản lý Organizer</span>
                </a>
            </li>
        </ul>
    </nav>

</aside>

</body>
</html>
