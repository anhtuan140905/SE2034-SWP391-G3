<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<aside th:fragment="sidebar" class="mod-sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
        <div class="brand-text">
            <span class="brand-name">EVENTHUB</span>
            <span class="brand-role">MODERATOR PORTAL</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <ul>
            <li th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <a th:href="@{/moderator/dashboard}">
                    <span class="nav-icon"><i class="fa-solid fa-table-cells-large"></i></span>
                    <span class="nav-label">Dashboard</span>
                </a>
            </li>
            <li th:classappend="${activePage == 'event-management'} ? 'active' : ''">
                <a th:href="@{/moderator/events}">
                    <span class="nav-icon"><i class="fa-regular fa-calendar-days"></i></span>
                    <span class="nav-label">Pending Event</span>
                </a>
            </li>

            <li th:classappend="${activePage == 'profile'} ? 'active' : ''">
                <a th:href="@{/moderator/profile}">
                    <span class="nav-icon"><i class="fa-regular fa-user"></i></span>
                    <span class="nav-label">Profile</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
        <a th:href="@{/auth/logout}" class="logout-btn">
            <span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
            <span class="nav-label">Logout</span>
        </a>
    </div>

</aside>

</body>
</html>
