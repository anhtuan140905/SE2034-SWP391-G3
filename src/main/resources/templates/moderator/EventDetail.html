<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{moderator/fragments/moderator_layout :: layout(
          ~{::title},
          ~{::section#event-detail-content},
          ~{:: #page-css},
          ~{:: #page-script}
      )}">
<head>
    <title>Event Detail — EventHub Moderator</title>
    <!--/*@thymesVar id="event" type="com.example.dto.EventDetailDTO"*/-->
    <link id="page-css" rel="stylesheet" th:href="@{/moderator/css/event_detail.css}"/>
</head>
<body>

<section id="event-detail-content" th:fragment="content">

    <!-- ── Header: Back + Title + Status badge ── -->
    <div class="ed-header">
        <div class="ed-header-left">
            <a th:href="@{/moderator/events}" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i>
                <span>QUAY TRỞ LẠI</span>
            </a>
            <div class="ed-title-block">
                <h1 class="ed-title" th:text="${event != null ? event.title : 'Trống'}">
                </h1>

                <p class="ed-event-id">
                    <i class="fa-solid fa-hashtag" style="margin-right: 4px;"></i> Event ID:
                    <span th:text="${event != null ? event.id : 'N/A'}"></span>
                </p>
            </div>
        </div>

        <span class="ed-status-badge"
              th:classappend="${event != null and event.status == 'APPROVED'} ? 'status-approved' :
                         (${event != null and event.status == 'REJECTED'} ? 'status-rejected' : 'status-pending')">
        <span th:text="${event != null ? event.status : 'PENDING'}"></span>
    </span>
    </div>

    <!-- ── Main 2-col layout ── -->
    <div class="ed-body">

        <!-- LEFT: Main Content -->
        <div class="ed-main">

            <!-- Card 1: Cover image -->
            <div class="ed-card ed-cover-card">
                <div class="ed-cover">
                    <img th:if="${event != null and event.coverImageUrl != null}"
                         th:src="${event.coverImageUrl}"
                         th:alt="${event.title}"
                         class="ed-cover-img"/>
                    <div th:if="${event == null or event.coverImageUrl == null}"
                         class="ed-cover-placeholder"></div>
                    <div class="ed-cover-overlays">
                        <span class="tag-category"
                              th:text="${event != null ? event.category : 'Live Music'}"></span>
                    </div>
                </div>
            </div>

            <!-- Card 2: Overview + Date row -->
            <div class="ed-card ed-content-card">
                <!-- Event Overview -->
                <div class="ed-section">
                    <h2 class="ed-section-title">TỔNG QUAN VỀ SỰ KIỆN</h2>
                    <div class="ed-overview-text">
                        <th:block th:if="${event != null}">
                            <p th:text="${event.description}">Mô tả:</p>
                        </th:block>
                        <th:block th:if="${event == null}">
                            <p>Không có gì để trình bày</p>
                        </th:block>
                    </div>
                </div>

                <!-- Date / Time / Duration row -->
                <div class="ed-date-row">
                    <div class="ed-date-item">
                        <span class="ed-date-label">Ngày tổ chức</span>
                        <span class="ed-date-value"
                              th:text="${event != null ? #temporals.format(event.startTime, 'dd-MM-yyyy') : 'Oct 24, 2026'}">
                        </span>
                    </div>
                    <div class="ed-date-item">
                        <span class="ed-date-label">Thời gian mở cửa</span>
                        <span class="ed-date-value"
                              th:text="${event != null ? #temporals.format(event.startTime, 'HH:mm') : '19:00 PM'}">
                        </span>
                    </div>
                    <div class="ed-date-item">
                        <span class="ed-date-label">Thời lượng</span>
                        <span class="ed-date-value"
                              th:text="${event != null ? event.duration : '8 Hours'}">
                        </span>
                    </div>
                </div>

            </div>
            <!-- end card 2 -->
        </div>
        <!-- end ed-main -->
        <!-- RIGHT: Sidebar -->
        <aside class="ed-sidebar">
            <!-- Venue & Location -->
            <div class="ed-info-card">
                <div class="ed-info-card-title">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Địa điểm</span>
                </div>
                <p class="ed-venue-name"
                   th:text="${event != null ? event.venueName : 'Cyber Docklands'}"></p>
                <p class="ed-venue-address"
                   th:text="${event != null ? event.venueAddress : '404 Neon Blvd, District 9, Metropolis'}">
                </p>
                <div class="ed-capacity-row">
                    <span class="ed-capacity-label">SỨC CHỨA</span>
                    <span class="ed-capacity-value"
                          th:text="${event != null ? #numbers.formatInteger(event.capacity, 0, 'COMMA') + ' Người' : '5,000 Persons'}">
                        5,000 Persons
                    </span>
                </div>
            </div>

            <!-- Total Tickets -->
            <div class="ed-info-card ed-ticket-card">
                <div class="ed-info-card-title">
                    <i class="fa-solid fa-ticket"></i>
                    <span>TỔNG SỐ VÉ</span>
                </div>
                <p class="ed-ticket-count"
                   th:text="${event != null ? #numbers.formatInteger(event.totalTickets, 0, 'COMMA') : '5,000'}">
                    5,000
                </p>
                <div class="ed-divider"></div>
                <p class="ed-organized-label">Tổ chức bởi</p>
                <p class="ed-organized-name"
                   th:text="${event != null ? event.organizerName : 'Sungha Company'}">Sungha Company</p>
            </div>

            <!-- Organizer -->
            <div class="ed-info-card">
                <div class="ed-info-card-title">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Người Tổ Chức</span>
                </div>
                <div class="ed-organizer-row">
                    <div class="ed-organizer-avatar">
                        <img th:if="${event != null and event.organizerAvatarUrl != null}"
                             th:src="${event.organizerAvatarUrl}"
                             th:alt="${event.organizerName}"/>
                        <span th:if="${event == null or event.organizerAvatarUrl == null}"
                              class="ed-avatar-fallback">
                            <i class="fa-solid fa-user"></i>
                        </span>
                    </div>
                    <div class="ed-organizer-info">
                        <p class="ed-organizer-name"
                           th:text="${event != null ? event.organizerName : 'Sungha Company'}">Sungha Company</p>
                    </div>
                    <a th:href="@{/moderator/information/{id}(id=${event?.organizerId ?: 0}, fromEvent=${event?.id ?: 0})}"
                       class="ed-organizer-arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </div>
            </div>

        </aside>
    </div>
    <!-- end ed-body -->

    <!-- Reject Boxx-->
    <div class="ed-reject-box" th:if="${event == null or event.status == 'PENDING'}">
        <div class="ed-reject-label">
            <i class="fa-solid fa-envelope-open-text"></i>
            <span>Thông điệp/ghi chú cho người tổ chức. Bắt buộc nếu bị từ chối</span>
        </div>
        <textarea id="reviewMessage"
                  class="ed-reject-textarea"
                  placeholder="Nhập lời chúc mừng hoặc lý do từ chối để hệ thống tự động gửi Email đến Ban tổ chức..."></textarea>
    </div>

    <div class="ed-action-footer">
        <div class="ed-action-btns">

            <button class="btn-reject"
                    th:if="${event == null or event?.status?.toString() != 'REJECTED'}"
                    th:onclick="|rejectEvent(${event?.id ?: 0})|">
                Từ chối
            </button>

            <button class="btn-approve"
                    th:if="${event == null or event?.status?.toString() != 'APPROVED'}"
                    th:onclick="|approveEvent(${event?.id ?: 0})|">
                Phê duyệt
            </button>

        </div>
    </div>

</section>

<script id="page-script" th:src="@{/moderator/js/event_detail.js}"></script>

</body>
</html>
