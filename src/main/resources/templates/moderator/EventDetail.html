<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{moderator/fragments/moderator_layout :: layout(
          ~{::title},
          ~{::section#event-detail-content},
          ~{:: #page-css},
          ~{:: #page-script}
      )}">
<head>
    <title>Event Detail — EventHub Moderator</title>
    <!--/*@thymesVar id="event" type="com.example.dto.EventDetailDTO"*/-->
    <link id="page-css" rel="stylesheet" th:href="@{/moderator/css/event_detail.css}"/>
</head>
<body>

<section id="event-detail-content" th:fragment="content">

    <!-- ── Header: Back + Title + Status badge ── -->
    <div class="ed-header">
        <div class="ed-header-left">
            <a th:href="@{/moderator/events}" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i>
                <span>QUAY LẠI DANH SÁCH</span>
            </a>
            <div class="ed-title-block">
                <h1 class="ed-title" th:text="${event != null ? event.title : 'Trống'}"></h1>

                <p>
                    Event ID:
                    <span th:text="${event != null ? event.eventId : 'N/A'}"></span>
                </p>
            </div>
        </div>

        <span class="ed-status-badge"
              th:classappend="${event != null and event.status.name() == 'ACTIVE'} ? 'status-active' :
                         (${event != null and event.status.name() == 'INACTIVE'} ? 'status-inactive' : 'status-ended')">
            <span th:text="${event != null ?
                (event.status.name() == 'ACTIVE' ? 'Đang hoạt động' :
                (event.status.name() == 'INACTIVE' ? 'Đã tắt' : 'Đã kết thúc')) : 'Đã tắt'}">
            </span>
        </span>
    </div>

    <!-- ── Main 2-col layout ── -->
    <div class="ed-body">

        <!-- LEFT: Main Content -->
        <div class="ed-main">

            <!-- Card 1: Cover image -->
            <div class="ed-card ed-cover-card">
                <div class="ed-cover">
                    <img th:if="${event != null and event.thumbnailUrl != null}"
                         th:src="${event.thumbnailUrl}"
                         th:alt="${event.title}"
                         class="ed-cover-img"/>
                    <div th:if="${event == null or event.thumbnailUrl == null}"
                         class="ed-cover-placeholder"></div>
                    <div class="ed-cover-overlays">
                        <span class="tag-category"
                              th:text="${event != null ? event.categoryName : 'Live Music'}"></span>
                    </div>
                </div>
            </div>

            <!-- Card 2: Overview + Date row -->
            <div class="ed-card ed-content-card">
                <!-- Event Overview -->
                <div class="ed-section">
                    <h2 class="ed-section-title">TỔNG QUAN VỀ SỰ KIỆN</h2>
                    <div class="ed-overview-text">
                        <th:block th:if="${event != null}">
                            <p th:text="${event.description}">Mô tả:</p>
                        </th:block>
                        <th:block th:if="${event == null}">
                            <p>Không có gì để trình bày</p>
                        </th:block>
                    </div>
                </div>

                <!-- Date / Time / Duration row -->
                <div class="ed-date-row">
                    <div class="ed-date-item">
                        <span class="ed-date-label">Ngày tổ chức</span>
                        <span class="ed-date-value"
                              th:text="${event != null ? #temporals.format(event.date, 'dd-MM-yyyy') : 'Oct 24, 2026'}">
                        </span>
                    </div>
                    <div class="ed-date-item">
                        <span class="ed-date-label">Thời gian bắt đầu</span>
                        <span class="ed-date-value"
                              th:text="${event != null ? #temporals.format(event.startTime, 'HH:mm') : '19:00 PM'}">
                        </span>
                    </div>
                    <div class="ed-date-item">
                        <span class="ed-date-label">Thời gian kết thúc</span>
                        <span class="ed-date-value"
                              th:text="${event != null ? #temporals.format(event.endTime, 'HH:mm') : '19:00 PM'}">
                        </span>
                    </div>
                </div>

            </div>
        </div>
        <!-- end ed-main -->
        <!-- RIGHT: Sidebar -->
        <aside class="ed-sidebar">
            <!-- Venue & Location -->
            <div class="ed-info-card">
                <div class="ed-info-card-title">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Địa điểm</span>
                </div>
                <p class="ed-venue-name"
                   th:text="${event != null ? event.venueName : 'Cyber Docklands'}"></p>
                <p class="ed-venue-address"
                   th:text="${event != null ? (event.venueAddress + ', '+ (event.wardName)+ ', '+ (event.cityName ?: '')) : ' '}">
                </p>
            </div>

            <!-- Organizer -->
            <div class="ed-info-card">
                <div class="ed-info-card-title">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Người Tổ Chức</span>
                </div>
                <a th:if="${event != null and event.organizerId != null}"
                   th:href="@{/moderator/information/{id}(id=${event.organizerId}, fromEvent=${event.eventId})}"
                   class="ed-organizer-row ed-organizer-link">

                    <div class="ed-organizer-avatar">
                        <img th:if="${event != null and event.organizerAvatarUrl != null}"
                             th:src="${event.organizerAvatarUrl}"
                             th:alt="${event.organizerName}"/>
                        <span th:if="${event.organizerAvatarUrl == null}"
                              class="ed-avatar-fallback">
                              <i class="fa-solid fa-user"></i>
                        </span>
                    </div>
                    <div class="ed-organizer-info">
                        <p class="ed-organizer-name"
                           th:text="${event != null ? event.organizerName : ''}">
                        </p>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

                <div th:if="${event == null or event.organizerId == null}" class="ed-organizer-row">
                    <div class="ed-organizer-avatar">
                        <span class="ed-avatar-fallback"><i class="fa-solid fa-user"></i></span>
                    </div>
                    <div class="ed-organizer-info">
                        <p class="ed-organizer-name">Tên Organizer</p>
                    </div>
                </div>
            </div>

        </aside>
    </div>

    <div class="ed-action-footer">
        <form class="ed-reject-box" th:if="${event != null and event.status.name() == 'ACTIVE'}"
              th:action="@{/moderator/events/{id}/deactivate(id=${event.eventId})}"
              method="post"
              onsubmit="return confirm('Bạn có chắc muốn TẮT sự kiện này không?');">
            <div class="ed-reject-label">
                <span>Lý do tắt sự kiện — sẽ được gửi email đến Organizer</span>
            </div>
            <textarea name="reason"
                      class="ed-reject-textarea"
                      required
                      minlength="5"
                      oninvalid="this.setCustomValidity('Vui lòng nhập lý do tắt sự kiện (ít nhất 5 ký tự).')"
                      oninput="this.setCustomValidity('')"
                      placeholder="Nhập lý do tắt sự kiện"></textarea>

            <button type="submit" class="btn-inactive">
                Tắt sự kiện
            </button>
        </form>

        <form th:if="${event != null and event.status.name() == 'INACTIVE'}"
              th:action="@{/moderator/events/{id}/activate(id=${event.eventId})}"
              method="post"
              onsubmit="return confirm('Bạn có chắc muốn BẬT LẠI sự kiện này không?');">
            <button type="submit" class="btn-activate">
                Bật lại sự kiện
            </button>
        </form>

        <!-- ENDED — không có hành động -->
        <div th:if="${event != null and event.status.name() == 'ENDED'}"
             class="ed-ended-note">
            Sự kiện đã kết thúc — không thể thay đổi trạng thái
        </div>
    </div>

</section>

<script id="page-script"></script>

</body>
</html>
